type: object
description: 新パスワード設定リクエスト（トークン検証込み）
required:
  - token
  - password
  - passwordConfirm
properties:
  token:
    type: string
    description: メールで送付されたリセットトークン（有効期限30分）
  password:
    type: string
    format: password
    description: 新しいパスワード（大文字・小文字・数字・記号を含む8文字以上）
  passwordConfirm:
    type: string
    format: password
    description: 新しいパスワード（確認用）

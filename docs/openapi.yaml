openapi: "3.0.3"
info:
  title: Training App API
  description: |
    Spring Boot製トレーニング管理アプリケーションのAPI仕様書。
    認証はSpring SecurityによるセッションベースのフォームログインおよびOAuth2（Google/LINE）に対応。
    管理者専用エンドポイントは ADMIN ロールが必要。
  version: "1.0.0"

servers:
  - url: http://localhost:8080
    description: ローカル開発環境

tags:
  - name: auth
    description: 認証・ユーザー登録
  - name: password
    description: パスワードリセット
  - name: training
    description: トレーニング管理（ログインユーザー）
  - name: master
    description: マスターデータ取得
  - name: admin
    description: 管理者専用操作

# ─────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────
paths:

  # ── 認証 ─────────────────────────────────────────────────────
  /login:
    get:
      tags: [auth]
      summary: ログイン画面表示
      description: Spring Securityが提供するフォームログイン画面を返す。
      responses:
        "200":
          description: ログイン画面HTML

  /signup:
    get:
      tags: [auth]
      summary: 新規登録画面表示
      responses:
        "200":
          description: 新規登録フォームHTML
    post:
      tags: [auth]
      summary: ユーザー新規登録
      description: フォームデータを受け取りユーザーを登録する。バリデーションエラー時はフォームを再表示する。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/SignupForm"
      responses:
        "302":
          description: 登録成功 → /login へリダイレクト
        "200":
          description: バリデーションエラー → フォーム再表示

  # ── パスワードリセット ────────────────────────────────────────
  /password/forget:
    get:
      tags: [password]
      summary: パスワードリセット申請画面
      responses:
        "200":
          description: メールアドレス入力フォームHTML
    post:
      tags: [password]
      summary: パスワードリセットメール送信
      description: 入力されたメールアドレスへリセット用トークンを送信する。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
      responses:
        "302":
          description: 送信完了 → /password/sent へリダイレクト
        "200":
          description: バリデーションエラーまたは送信失敗 → フォーム再表示

  /password/sent:
    get:
      tags: [password]
      summary: パスワードリセットメール送信完了画面
      responses:
        "200":
          description: 送信完了画面HTML

  /password/reset:
    get:
      tags: [password]
      summary: 新パスワード入力画面
      parameters:
        - name: token
          in: query
          required: true
          description: メールで送付されたリセットトークン
          schema:
            type: string
      responses:
        "200":
          description: 新パスワード入力フォームHTML
    post:
      tags: [password]
      summary: パスワード更新
      description: トークンを検証し、パスワードを更新する。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token, password, passwordConfirm]
              properties:
                token:
                  type: string
                password:
                  type: string
                  format: password
                passwordConfirm:
                  type: string
                  format: password
      responses:
        "302":
          description: 更新成功 → /login?resetSuccess へリダイレクト
        "200":
          description: パスワード不一致またはトークン無効 → フォーム再表示

  # ── メニュー（カレンダー） ────────────────────────────────────
  /menu:
    get:
      tags: [training]
      summary: メニュー画面（カレンダー表示）
      description: ログインユーザーのトレーニングカレンダーを表示する。認証必須。
      parameters:
        - name: date
          in: query
          required: false
          description: 表示する月の日付（省略時は今日）
          schema:
            type: string
            format: date
            example: "2026-05-01"
      responses:
        "200":
          description: カレンダー付きメニュー画面HTML
        "302":
          description: 未認証 → ログインページへリダイレクト

  /menu/save:
    post:
      tags: [training]
      summary: トレーニング保存（フォーム）
      description: フォームからトレーニングを登録・更新する。認証必須。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TrainingForm"
      responses:
        "302":
          description: 保存完了 → /menu?date={trainingDate} へリダイレクト

  /menu/delete:
    post:
      tags: [training]
      summary: トレーニング削除（フォーム）
      description: 指定IDのトレーニングを削除する。所有者チェックあり。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
                  format: int64
      responses:
        "302":
          description: 削除完了またはアクセス拒否 → /menu へリダイレクト

  /start/training:
    get:
      tags: [training]
      summary: トレーニング実施画面
      description: 指定日のトレーニング一覧とタイマー情報を含む実施画面を返す。
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2026-05-26"
      responses:
        "200":
          description: トレーニング実施画面HTML

  /training/register:
    get:
      tags: [training]
      summary: トレーニング登録画面
      description: 新規トレーニング登録フォームを表示する。
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-05-26"
      responses:
        "200":
          description: トレーニング登録フォームHTML

  # ── トレーニング REST API ──────────────────────────────────────
  /api/training-parts:
    get:
      tags: [master]
      summary: トレーニング部位一覧取得
      description: 部位マスター（training_part_master）の全件を返す。
      responses:
        "200":
          description: 部位一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingMaster"

  /api/training-items:
    get:
      tags: [master]
      summary: 部位別トレーニング種目一覧取得
      parameters:
        - name: partCode
          in: query
          required: true
          description: 部位コード（CHEST / BACK / ARM / SHOULDER / LEG）
          schema:
            type: string
            example: CHEST
      responses:
        "200":
          description: 種目一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingItemMaster"

  /api/training-items-grouped:
    get:
      tags: [master]
      summary: 全部位のトレーニング種目をグループ別に取得
      description: 部位コードをキー、種目リストを値とするオブジェクトを返す。
      responses:
        "200":
          description: 部位コード別種目マップ
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    $ref: "#/components/schemas/TrainingItemMaster"
              example:
                CHEST:
                  - id: 1
                    partCode: CHEST
                    itemName: ベンチプレス
                    displayOrder: 1
                BACK:
                  - id: 10
                    partCode: BACK
                    itemName: デッドリフト
                    displayOrder: 1

  /api/training/save:
    post:
      tags: [training]
      summary: トレーニング保存（JSON API）
      description: |
        トレーニングを新規登録または更新する。
        ログインユーザーのIDが自動付与される。登録成功時はトレーニングIDを返す。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingRequest"
      responses:
        "200":
          description: 登録・更新されたトレーニングID
          content:
            application/json:
              schema:
                type: integer
                format: int64
                example: 42

  /api/training/finish:
    post:
      tags: [training]
      summary: トレーニング完了処理（一括保存）
      description: |
        トレーニングリストを一括保存し完了状態にする。
        所有者チェックあり。セットデータが空の場合は400を返す。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/TrainingRequest"
      responses:
        "200":
          description: 保存成功
          content:
            application/json:
              schema:
                type: string
                example: 保存に成功しました
        "400":
          description: セットデータ未入力または不正なトレーニングID
          content:
            application/json:
              schema:
                type: string
        "403":
          description: 他ユーザーのトレーニングへのアクセス
          content:
            application/json:
              schema:
                type: string
        "404":
          description: 指定したトレーニングが存在しない
        "500":
          description: 内部エラー
          content:
            application/json:
              schema:
                type: string

  /api/training/{id}:
    get:
      tags: [training]
      summary: トレーニング取得
      description: 指定IDのトレーニングを返す。所有者チェックあり。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: トレーニング情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Training"
        "403":
          description: 他ユーザーのデータへのアクセス
        "404":
          description: 存在しないID

  /api/training/update/{id}:
    post:
      tags: [training]
      summary: トレーニング更新
      description: 指定IDのトレーニングを更新する。所有者チェックあり。trainerDate・partCode・userIdはサーバー側で保持する。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingRequest"
      responses:
        "200":
          description: 更新成功
        "403":
          description: 他ユーザーのデータへのアクセス
        "404":
          description: 存在しないID

  /api/training/delete/{id}:
    post:
      tags: [training]
      summary: トレーニング削除（JSON API）
      description: 指定IDのトレーニングを削除する。所有者チェックあり。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 削除成功
        "403":
          description: 他ユーザーのデータへのアクセス
        "404":
          description: 存在しないID

  /api/training/register-bulk:
    post:
      tags: [training]
      summary: トレーニング一括登録
      description: |
        日付と複数のトレーニングデータをまとめて登録・更新する。
        id が指定されている場合は既存データを更新、ない場合は新規登録する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkRegisterRequest"
            example:
              date: "2026-05-26"
              trainings:
                - id: null
                  partCode: CHEST
                  menu: ベンチプレス
                  details:
                    - weight: 60.0
                      reps: 10
                      isCompleted: false
                - id: 5
                  partCode: BACK
                  menu: デッドリフト
                  details:
                    - weight: 80.0
                      reps: 5
                      isCompleted: true
      responses:
        "200":
          description: 保存成功
          content:
            application/json:
              schema:
                type: string
                example: 保存に成功しました
        "500":
          description: 登録失敗
          content:
            application/json:
              schema:
                type: string

  # ── 管理者画面 ────────────────────────────────────────────────
  /admin/users:
    get:
      tags: [admin]
      summary: ユーザー一覧画面
      description: 全ユーザーの一覧を表示する。ADMIN ロール必須。
      security:
        - sessionAuth: []
      responses:
        "200":
          description: ユーザー一覧HTML
        "403":
          description: 権限なし

  /admin/user/edit/{id}:
    get:
      tags: [admin]
      summary: ユーザー編集画面
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ユーザー編集フォームHTML
        "404":
          description: 指定ユーザーが存在しない

  /admin/user/update:
    post:
      tags: [admin]
      summary: ユーザー情報更新
      description: ユーザー情報を更新する（パスワードは変更しない）。
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/UserUpdateForm"
      responses:
        "302":
          description: 更新完了 → /admin/users へリダイレクト

  /admin/all-users-training:
    get:
      tags: [admin]
      summary: 全ユーザーのトレーニング一覧画面
      security:
        - sessionAuth: []
      parameters:
        - name: userName
          in: query
          required: false
          description: ユーザー名で絞り込み（部分一致）
          schema:
            type: string
      responses:
        "200":
          description: ユーザー一覧HTML（トレーニング状況付き）

  /admin/user/training-detail/{id}:
    get:
      tags: [admin]
      summary: ユーザーのトレーニング詳細画面（カレンダー＋グラフ）
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ユーザーID
          schema:
            type: integer
        - name: date
          in: query
          required: false
          description: 表示対象月（省略時は今月）
          schema:
            type: string
            format: date
            example: "2026-05-01"
      responses:
        "200":
          description: ユーザートレーニング詳細HTML
        "404":
          description: 指定ユーザーが存在しない

  # ── 管理者 REST API ───────────────────────────────────────────
  /admin/training-details:
    get:
      tags: [admin]
      summary: ユーザーの指定日トレーニング詳細取得（AdminController）
      description: |
        指定ユーザーと日付に紐づくトレーニングリスト（セット詳細含む）をJSONで返す。
        ユーザー存在確認を行い、存在しない場合はRuntimeExceptionが発生する。
      security:
        - sessionAuth: []
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          description: 取得対象日（ISO 8601形式）
          schema:
            type: string
            format: date
            example: "2026-05-26"
      responses:
        "200":
          description: トレーニングリスト（セット詳細含む）
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Training"
        "500":
          description: 内部エラー

  /admin/chart-data:
    get:
      tags: [admin]
      summary: ユーザーのボリュームグラフデータ取得（AdminController）
      description: |
        指定ユーザーの部位別トレーニングボリューム（重量×回数）を日次集計して返す。
        startDate/endDate省略時は過去30日間が対象になる。
      security:
        - sessionAuth: []
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-04-26"
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-05-26"
      responses:
        "200":
          description: グラフ用ボリュームデータ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartData"
        "500":
          description: 内部エラー

  /admin/api/training-details:
    get:
      tags: [admin]
      summary: トレーニング詳細取得（TrainingApiController）
      description: |
        指定日付のTrainingDetailリストを返す。userId省略時は全ユーザーの指定日データを返す。
        @PreAuthorize("hasRole('ADMIN')") によりADMINロール必須。
      security:
        - sessionAuth: []
      parameters:
        - name: date
          in: query
          required: true
          description: 取得対象日（文字列形式 YYYY-MM-DD）
          schema:
            type: string
            example: "2026-05-26"
        - name: userId
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: トレーニング詳細一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingDetail"
        "403":
          description: 権限なし

  /admin/api/training-volume/{userId}:
    get:
      tags: [admin]
      summary: ユーザーのボリュームデータ取得（TrainingApiController）
      description: |
        指定ユーザーの期間別トレーニングボリュームを返す。
        @PreAuthorize("hasRole('ADMIN')") によりADMINロール必須。IDORをURLレベル＋メソッドレベルで防止。
      security:
        - sessionAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2026-04-26"
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2026-05-26"
      responses:
        "200":
          description: ボリュームデータ（Map<String, Object>形式）
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: 権限なし

# ─────────────────────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────────────────────
components:

  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID
      description: Spring Securityのセッション認証。ログイン後にJSESSIONIDクッキーが付与される。

  schemas:

    # ── ユーザー ──────────────────────────────────────────────
    User:
      type: object
      description: ユーザーエンティティ（usersテーブル）
      properties:
        userId:
          type: integer
          description: ユーザーID（主キー・自動採番）
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        userName:
          type: string
          example: 山田太郎
        role:
          type: string
          description: ロール（USER / ADMIN）
          example: USER
        enabled:
          type: boolean
          description: アカウント有効フラグ
          example: true
        googleId:
          type: string
          nullable: true
          description: Google OAuthアカウントID
        lineId:
          type: string
          nullable: true
          description: LINE OAuthアカウントID
        createDatetime:
          type: string
          format: date-time
        updatedDatetime:
          type: string
          format: date-time

    SignupForm:
      type: object
      description: ユーザー新規登録フォーム
      required: [username, email, password, password_confirm]
      properties:
        username:
          type: string
          description: ユーザー名（空白不可）
          example: 山田太郎
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
        password_confirm:
          type: string
          format: password
        googleId:
          type: string
          nullable: true
        lineId:
          type: string
          nullable: true

    UserUpdateForm:
      type: object
      description: ユーザー情報更新フォーム（管理者用）
      properties:
        userId:
          type: integer
        email:
          type: string
          format: email
        userName:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        enabled:
          type: boolean

    # ── トレーニング ──────────────────────────────────────────
    Training:
      type: object
      description: トレーニングエンティティ（trainingsテーブル）
      properties:
        id:
          type: integer
          format: int64
          description: トレーニングID（主キー・自動採番）
          example: 1
        userId:
          type: integer
          format: int64
          description: ユーザーID（FK → users.id）
          example: 1
        trainingDate:
          type: string
          format: date
          example: "2026-05-26"
        partCode:
          type: string
          description: 部位コード（FK → training_part_master.part_code）
          example: CHEST
        menu:
          type: string
          description: トレーニング種目名
          example: ベンチプレス
        partName:
          type: string
          description: 部位名（表示用・非保存）
          example: 胸
          readOnly: true
        memo:
          type: string
          nullable: true
        duration:
          type: string
          nullable: true
          description: トレーニング時間（HH:mm:ss形式）
          example: "01:23:45"
        isCompleted:
          type: boolean
          description: 種目完了フラグ
          example: false
        isAllCompleted:
          type: boolean
          description: 全セット完了フラグ
          example: false
        details:
          type: array
          description: セット詳細リスト（@Transient・JOIN取得）
          items:
            $ref: "#/components/schemas/TrainingDetail"
        createDatetime:
          type: string
          format: date-time
        updatedDatetime:
          type: string
          format: date-time

    TrainingRequest:
      type: object
      description: トレーニング登録・更新リクエスト（JSON）
      required: [trainingDate, partCode, menu, details]
      properties:
        id:
          type: integer
          format: int64
          nullable: true
          description: 更新時に指定。新規登録時はnull
        trainingDate:
          type: string
          format: date
          example: "2026-05-26"
        partCode:
          type: string
          example: CHEST
        menu:
          type: string
          example: ベンチプレス
        memo:
          type: string
          nullable: true
        duration:
          type: string
          nullable: true
          example: "01:00:00"
        isCompleted:
          type: boolean
          default: false
        isAllCompleted:
          type: boolean
          default: false
        details:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/TrainingDetailRequest"

    TrainingForm:
      type: object
      description: メニュー画面フォーム送信用トレーニングデータ（application/x-www-form-urlencoded）
      required: [trainingDate, partCode, menu]
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        trainingDate:
          type: string
          format: date
        partCode:
          type: string
        menu:
          type: string
        memo:
          type: string
          nullable: true

    TrainingDetail:
      type: object
      description: トレーニングセット詳細（training_detailsテーブル）
      properties:
        id:
          type: integer
          format: int64
          example: 1
        trainingId:
          type: integer
          format: int64
          description: FK → trainings.id
          example: 1
        setNumber:
          type: integer
          description: セット番号（1以上）
          minimum: 1
          example: 1
        weight:
          type: number
          format: double
          description: 重量（kg、0以上）
          minimum: 0
          example: 60.0
        reps:
          type: integer
          description: 回数（0以上。入力中の暫定値として0を許容）
          minimum: 0
          example: 10
        count:
          type: integer
          nullable: true
        completed:
          type: boolean
          description: セット完了フラグ（JSONキー名は "completed"）
          example: false
        createDatetime:
          type: string
          format: date-time
        updatedDatetime:
          type: string
          format: date-time

    TrainingDetailRequest:
      type: object
      description: セット詳細の登録・更新リクエスト
      required: [weight, reps]
      properties:
        weight:
          type: number
          format: double
          minimum: 0
          example: 60.0
        reps:
          type: integer
          minimum: 0
          description: 回数（0以上。入力中の暫定値として0を許容）
          example: 10
        setNumber:
          type: integer
          minimum: 1
          example: 1
        completed:
          type: boolean
          description: セット完了フラグ（JSONキー名は "completed"。@JsonProperty("completed") により isCompleted フィールドにマッピングされる）
          default: false

    # ── マスターデータ ─────────────────────────────────────────
    TrainingMaster:
      type: object
      description: 部位マスター（training_part_masterテーブル）
      properties:
        id:
          type: integer
          format: int64
          example: 1
        partCode:
          type: string
          description: 部位コード
          example: CHEST
        partName:
          type: string
          description: 部位名
          example: 胸
        displayOrder:
          type: integer
          description: 表示順
          example: 1
        itemName:
          type: string
          nullable: true

    TrainingItemMaster:
      type: object
      description: トレーニング種目マスター（training_item_masterテーブル）
      properties:
        id:
          type: integer
          format: int64
          example: 1
        partCode:
          type: string
          description: 部位コード（FK → training_part_master.part_code）
          example: CHEST
        itemName:
          type: string
          description: 種目名
          example: ベンチプレス
        displayOrder:
          type: integer
          description: 表示順
          example: 1

    # ── グラフデータ ──────────────────────────────────────────
    ChartData:
      type: object
      description: 部位別トレーニングボリューム日次集計（グラフ表示用）
      properties:
        labels:
          type: array
          description: 日付ラベル一覧（YYYY-MM-DD形式）
          items:
            type: string
          example: ["2026-04-26", "2026-04-27"]
        chest:
          type: array
          description: 胸のボリューム（重量×回数の合計）
          items:
            type: number
            format: double
          example: [600.0, 0.0]
        back:
          type: array
          description: 背中のボリューム
          items:
            type: number
            format: double
        arms:
          type: array
          description: 腕のボリューム
          items:
            type: number
            format: double
        shoulders:
          type: array
          description: 肩のボリューム
          items:
            type: number
            format: double
        legs:
          type: array
          description: 脚のボリューム
          items:
            type: number
            format: double

    # ── 一括登録リクエスト ─────────────────────────────────────
    BulkRegisterRequest:
      type: object
      description: トレーニング一括登録リクエスト（/api/training/register-bulk）
      required: [date, trainings]
      properties:
        date:
          type: string
          format: date
          description: トレーニング日
          example: "2026-05-26"
        trainings:
          type: array
          description: トレーニングデータリスト
          items:
            type: object
            required: [partCode, menu, details]
            properties:
              id:
                type: integer
                format: int64
                nullable: true
                description: 更新時に指定。新規はnullまたは空文字
              partCode:
                type: string
                example: CHEST
              menu:
                type: string
                example: ベンチプレス
              details:
                type: array
                minItems: 1
                items:
                  type: object
                  properties:
                    weight:
                      type: number
                      format: double
                      example: 60.0
                    reps:
                      type: integer
                      example: 10
                    isCompleted:
                      type: boolean
                      example: false

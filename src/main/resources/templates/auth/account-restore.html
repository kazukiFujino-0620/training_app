<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント復元 - トレーニング管理システム</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-container">
    <div class="login-background"></div>

    <div class="theme-toggle-login">
        <button class="settings-btn" data-action="toggleTheme" aria-label="テーマ切り替え">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </div>

    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
            </div>
            <h1 class="login-title">アカウントを復元する</h1>
            <p class="login-subtitle">以前のデータを引き継いでアカウントを復元します</p>
        </div>

        <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>

        <div class="info-message">
            <p>ボタンをクリックすると、アカウントが復元されます。<br>
               以前のトレーニングデータはそのまま引き継がれます。</p>
        </div>

        <form th:action="@{/account/restore/confirm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="token" th:value="${token}"/>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                アカウントを復元する
            </button>
        </form>

        <div class="login-footer">
            <p>ログイン画面に戻る</p>
            <a th:href="@{/login}" class="text-primary">ログイン</a>
        </div>
    </div>

    <script th:src="@{/js/theme.js}"></script>
</body>
</html>

name: CI/CD for TrainingApp

on:
  push:
    branches: [master]

# 最小権限の原則: デプロイは読み取りのみ。
# サードパーティ Action 改ざん時の被害を最小化する。
permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Javaのセットアップ
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      # 2. Mavenビルド
      - name: Build with Maven
        run: mvn clean package -PGCP -DskipTests
        env:
          JASYPT_ENCRYPTOR_PASSWORD: ${{ secrets.JASYPT_PASSWORD }}

      # 4. JARファイルをサーバーに転送 (SCP)
      - name: Copy JAR to GCP VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_SSH_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "target/TraningApp-*.jar"
          target: "/opt/trainingapp/"
          strip_components: 1

      # 5. サーバー上のアプリを再起動
      - name: Restart Application Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_SSH_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cp /opt/trainingapp/TraningApp-*.jar /opt/trainingapp/trainingapp.jar
            sudo systemctl set-environment SPRING_PROFILES_ACTIVE=gcp
            sudo systemctl restart trainingapp

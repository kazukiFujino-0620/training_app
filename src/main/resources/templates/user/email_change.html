<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:with="theme=${session.theme ?: 'light'}"
      th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メールアドレス変更 - トレーニング管理システム</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-secondary">
    <header th:replace="~{common :: headerFragment}"></header>
    <main class="main-content">
        <div class="content-wrapper" style="max-width: 500px; margin: 0 auto; padding: 24px 16px;">
            <div class="mb-6">
                <h1 class="text-3xl font-bold text-primary">メールアドレス変更</h1>
            </div>

            <!-- フラッシュメッセージ -->
            <div th:if="${successMessage}" class="alert alert-success mb-4" th:text="${successMessage}"></div>
            <div th:if="${infoMessage}" class="alert alert-info mb-4" th:text="${infoMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger mb-4" th:text="${errorMessage}"></div>

            <!-- OAuth2 ユーザー向け -->
            <div th:if="${isOAuthUser}" class="card">
                <div class="card-body">
                    <p class="text-muted">Google / LINE でログインしているアカウントはメールアドレスを変更できません。</p>
                </div>
            </div>

            <!-- パスワードログインユーザー向け -->
            <div th:unless="${isOAuthUser}" class="card">
                <div class="card-body">
                    <p class="text-muted mb-4">現在: <strong th:text="${currentEmail}"></strong></p>
                    <form th:action="@{/user/email}" method="post" class="space-y-4">
                        <div>
                            <label class="form-label">新しいメールアドレス</label>
                            <input type="email" name="newEmail" class="form-control" required maxlength="255">
                        </div>
                        <div>
                            <label class="form-label">現在のパスワード</label>
                            <input type="password" name="currentPassword" class="form-control" required>
                        </div>
                        <div class="pt-2">
                            <button type="submit" class="btn btn-primary w-full">変更を申請する</button>
                        </div>
                    </form>
                    <p class="text-muted text-xs mt-4">
                        ※ 確認メールを新しいアドレスへ送信します。<br>
                        ※ リンクの有効期限は24時間です。
                    </p>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{common :: footerFragment}"></footer>
    <script th:src="@{/js/theme.js}"></script>
</body>
</html>

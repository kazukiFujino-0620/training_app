<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>ログイン</title></head>
<body>
    <h2>ログイン</h2>
    <div th:if="${param.logout}" style="color: blue; margin-bottom: 10px;">
	    ログアウトしました。
	</div>

	<div th:if="${param.error}" style="color: red; margin-bottom: 10px;">
	    メールアドレスまたはパスワードが正しくありません。
	</div>
    <form th:action="@{/login}" method="post">
		メールアドレス: <input type="email" name="username"><br>
		パスワード: <input type="password" name="password"><br>
        <button type="submit">ログイン</button>
    </form>
    
    <hr><div>
        <p>他のアカウントでログイン</p><br>
        <button type="button" onclick = "alert(後ほど)">Googleでログイン</button>
    </div>
    <a th:href="@{/signup}">新規登録はこちら...</a>
    <a th:href="@{/password/forget}">パスワードを忘れた方はこちら...</a>
</body>
</html>

spring.application.name=TraningApp

# JPA設定（MySQL用）
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# MySQL接続設定
spring.datasource.url=jdbc:mysql://localhost:3306/training_db?serverTimezone=Asia/Tokyo
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Doma2設定
doma.dialect=mysql

# バッチ設定
batch.master.update.file-path=/Users/fujinoikki/Desktop/java_app/TraningApp/input/master_data.csv
batch.master.update.cron=0 0 2 * * *
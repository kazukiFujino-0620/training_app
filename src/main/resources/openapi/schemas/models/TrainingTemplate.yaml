type: object
description: トレーニングテンプレート（training_templates テーブル）
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    example: 1
  userId:
    type: integer
    format: int64
    readOnly: true
    description: テンプレートオーナーのユーザーID
    example: 10
  name:
    type: string
    maxLength: 100
    description: テンプレート名
    example: "胸の日A"
  partCode:
    $ref: "../enums/PartCode.yaml"
  memo:
    type: string
    maxLength: 500
    nullable: true
    description: メモ
  items:
    type: array
    description: テンプレート明細（種目×セット一覧）。GET時のみ含まれる。
    items:
      $ref: "./TrainingTemplateItem.yaml"
  createdAt:
    type: string
    format: date-time
    readOnly: true
  updatedAt:
    type: string
    format: date-time
    readOnly: true
required: [name, partCode]

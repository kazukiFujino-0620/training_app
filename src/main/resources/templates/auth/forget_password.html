<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>パスワード再発行</title></head>
<body>
    <h2>パスワード再発行</h2>
    <p>ユーザー名かメールアドレスどちらかを入力してください</p>
    <form th:action="@{/password/forget}" method="post">
        ユーザー名: <input type="username" name="username"><br>
        メールアドレス: <input type="email" name="email"><br>
        <button type="submit">メール送信</button>
    </form>
    <a th:href="@{/login}">戻る</a>
</body>
</html>

<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="theme=${session.theme ?: 'light'}"
      th:attr="data-theme=${theme}">
<head>
  <meta charset="UTF-8"/>    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2FA セットアップ - トレーニング管理システム</title>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <style>
    .setup-page { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
    .setup-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .setup-card-header {
      padding: 16px 20px;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-color);
    }
    .setup-card-body { padding: 20px; }
    .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: var(--color-primary, #3b82f6);
      color: #fff;
      border-radius: 50%;
      font-size: 0.8rem;
      font-weight: 700;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .step-row { display: flex; align-items: flex-start; margin-bottom: 20px; }
    .step-content { flex: 1; }
    .step-title { font-weight: 600; font-size: 0.9rem; color: var(--text-primary); margin-bottom: 6px; }
    .info-text { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }
    .qr-wrapper { text-align: center; margin: 12px 0; }
    .qr-wrapper img { max-width: 200px; border-radius: 8px; border: 2px solid var(--border-color); }
    .secret-key-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: monospace;
      font-size: 0.9rem;
      color: var(--text-primary);
      word-break: break-all;
      margin: 8px 0;
    }
    .otp-input {
      width: 100%;
      padding: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1.2rem;
      text-align: center;
      letter-spacing: 0.3em;
      box-sizing: border-box;
    }
    .otp-input:focus { outline: none; border-color: var(--color-primary, #3b82f6); }
    .btn {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      width: 100%;
      text-align: center;
      box-sizing: border-box;
    }
    .btn-primary { background: var(--color-primary, #3b82f6); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); }
    .alert-danger { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.3); padding: 12px 16px; border-radius: 10px; font-size: 0.9rem; margin-bottom: 16px; }
  </style>
</head>
<body>
  <th:block th:replace="~{common :: headerFragment}"/>

  <div class="setup-page">
    <h1 style="font-size:1.4rem;font-weight:700;color:var(--text-primary);margin-bottom:20px;">
      2段階認証 セットアップ
    </h1>

    <div th:if="${error}" class="alert-danger" th:text="${error}"></div>

    <div class="setup-card">
      <div class="setup-card-header">設定手順</div>
      <div class="setup-card-body">

        <!-- Step 1: アプリインストール -->
        <div class="step-row">
          <span class="step-num">1</span>
          <div class="step-content">
            <div class="step-title">Authenticatorアプリをインストール</div>
            <p class="info-text">
              スマートフォンに Google Authenticator、Authy などのAuthenticatorアプリをインストールしてください。
            </p>
          </div>
        </div>

        <!-- Step 2: QRコードスキャン -->
        <div class="step-row">
          <span class="step-num">2</span>
          <div class="step-content">
            <div class="step-title">QRコードをスキャン</div>
            <p class="info-text">アプリでQRコードをスキャンするか、手動でキーを入力してください。</p>
            <div class="qr-wrapper">
              <img th:src="${qrDataUri}" alt="QRコード"/>
            </div>
            <p class="info-text" style="margin-bottom:4px;">手動入力キー:</p>
            <div class="secret-key-box" th:text="${secret}"></div>
          </div>
        </div>

        <!-- Step 3: OTP確認 -->
        <div class="step-row">
          <span class="step-num">3</span>
          <div class="step-content">
            <div class="step-title">アプリのコードを入力して有効化</div>
            <p class="info-text" style="margin-bottom:12px;">
              アプリに表示されている6桁のコードを入力してください。
            </p>
            <form th:action="@{/user/mfa/enable}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="text" name="otp" class="otp-input" maxlength="6"
                     placeholder="000000" inputmode="numeric" pattern="\d{6}"
                     autocomplete="one-time-code" required style="margin-bottom:12px;"/>
              <button type="submit" class="btn btn-primary">有効化する</button>
            </form>
          </div>
        </div>

      </div>
    </div>

    <a th:href="@{/user/mfa}" class="btn btn-secondary">キャンセル</a>
  </div>

  <script th:src="@{/js/common.js}"></script>
</body>
</html>

spring:
  config:
    import: optional:file:.env

jasypt:
  encryptor:
    # 必須: 環境変数 JASYPT_ENCRYPTOR_PASSWORD を設定してください。
    # デフォルト値は設定しません。未設定のまま起動すると IllegalArgumentException で失敗します。
    password: ${JASYPT_ENCRYPTOR_PASSWORD}
    algorithm: PBEWithHmacSHA512AndAES_256
    key-obtention-iterations: 310000
    provider-name: SunJCE

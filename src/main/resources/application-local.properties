# Local development profile properties
LOGS_PATH=./logs

logging.level.org.springframework=DEBUG
logging.level.com.example.traning=DEBUG

# ローカルDB認証情報（本番は環境変数で注入）
SPRING_DATASOURCE_USERNAME=root
SPRING_DATASOURCE_PASSWORD=
jasypt.encryptor.password=local-dev-key

# Remember-me シークレットキー（本番は強力なランダム値を環境変数 APP_REMEMBER_ME_KEY に設定）
app.security.remember-me-key=local-dev-remember-me-key-change-in-production

# バッチファイルパス（ローカル開発用）
BATCH_FILE_PATH=/Users/fujinoikki/Desktop/java_app/develop/training_app/src/main/resources/input/master_data.csv
BATCH_ALLOWED_DIR=/Users/fujinoikki/Desktop/java_app/develop/training_app/src/main/resources/input/

# Swagger UI (local development only)
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/openapi.yaml


type: object
description: トレーニングエンティティ（trainings テーブル）
properties:
  id:
    type: integer
    format: int64
    description: トレーニングID（主キー・自動採番）
    example: 1
  userId:
    type: integer
    format: int64
    description: ユーザーID（FK → users.id）
    example: 1
  trainingDate:
    type: string
    format: date
    example: "2026-05-26"
  partCode:
    $ref: "../enums/PartCode.yaml"
  menu:
    type: string
    description: トレーニング種目名
    example: ベンチプレス
  partName:
    type: string
    description: 部位名（表示用・DBには保存しない）
    example: 胸
    readOnly: true
  memo:
    type: string
    nullable: true
  duration:
    type: string
    nullable: true
    description: トレーニング時間（HH:mm:ss 形式）
    example: "01:23:45"
  isCompleted:
    type: boolean
    description: 種目完了フラグ
    example: false
  isAllCompleted:
    type: boolean
    description: 全セット完了フラグ
    example: false
  details:
    type: array
    description: セット詳細リスト（@Transient・JOIN 取得）
    items:
      $ref: "./TrainingDetail.yaml"
  createDatetime:
    type: string
    format: date-time
    readOnly: true
  updatedDatetime:
    type: string
    format: date-time
    readOnly: true

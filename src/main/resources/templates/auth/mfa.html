<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2段階認証 - トレーニング管理システム</title>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <style>
    .mfa-verify-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary, #0f172a);
      padding: 16px;
    }
    .mfa-verify-card {
      background: var(--bg-card, #1e293b);
      border: 1px solid var(--border-color, #334155);
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
    }
    .mfa-icon {
      text-align: center;
      margin-bottom: 16px;
    }
    .mfa-icon svg { width: 48px; height: 48px; color: var(--color-primary, #3b82f6); }
    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary, #f1f5f9);
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted, #94a3b8);
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .otp-input {
      width: 100%;
      padding: 14px;
      background: var(--bg-secondary, #0f172a);
      border: 1px solid var(--border-color, #334155);
      border-radius: 10px;
      color: var(--text-primary, #f1f5f9);
      font-size: 1.4rem;
      text-align: center;
      letter-spacing: 0.4em;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    .otp-input:focus { outline: none; border-color: var(--color-primary, #3b82f6); }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color, #334155);
    }
    .divider span { font-size: 0.8rem; color: var(--text-muted, #94a3b8); white-space: nowrap; }
    .backup-input {
      width: 100%;
      padding: 12px;
      background: var(--bg-secondary, #0f172a);
      border: 1px solid var(--border-color, #334155);
      border-radius: 10px;
      color: var(--text-primary, #f1f5f9);
      font-size: 1rem;
      text-align: center;
      letter-spacing: 0.15em;
      font-family: monospace;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    .backup-input:focus { outline: none; border-color: var(--color-primary, #3b82f6); }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--color-primary, #3b82f6);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-submit:hover { opacity: 0.9; }
    .error-box {
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #f87171;
      font-size: 0.85rem;
      margin-bottom: 16px;
      text-align: center;
    }
    .logout-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--text-muted, #94a3b8);
      text-decoration: none;
    }
    .logout-link:hover { color: var(--text-primary, #f1f5f9); }
    .tab-row {
      display: flex;
      border-bottom: 1px solid var(--border-color, #334155);
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: var(--text-muted, #94a3b8);
      font-size: 0.85rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--color-primary, #3b82f6); border-bottom-color: var(--color-primary, #3b82f6); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body class="login-container" th:attr="data-theme=${session.theme ?: 'light'}">
  <div class="mfa-verify-container">
    <div class="mfa-verify-card">
      <div class="mfa-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="11" width="14" height="10" rx="2" ry="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
      </div>

      <h1>2段階認証</h1>
      <p class="subtitle">Authenticatorアプリのコードを入力するか、<br>バックアップコードを使用してください。</p>

      <div th:if="${error}" class="error-box" th:text="${error}"></div>

      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('otp', this)">Authenticatorコード</button>
        <button class="tab-btn" onclick="switchTab('backup', this)">バックアップコード</button>
      </div>

      <!-- OTPタブ -->
      <div id="tab-otp" class="tab-panel active">
        <form th:action="@{/auth/mfa/verify}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="text" name="otp" class="otp-input" maxlength="6"
                 placeholder="000000" inputmode="numeric" pattern="\d{6}"
                 autocomplete="one-time-code" autofocus/>
          <button type="submit" class="btn-submit">確認</button>
        </form>
      </div>

      <!-- バックアップコードタブ -->
      <div id="tab-backup" class="tab-panel">
        <form th:action="@{/auth/mfa/verify}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="text" name="backupCode" class="backup-input" maxlength="8"
                 placeholder="XXXXXXXX" autocomplete="off" autocorrect="off"
                 autocapitalize="characters" spellcheck="false"/>
          <button type="submit" class="btn-submit">バックアップコードで認証</button>
        </form>
      </div>

      <a th:href="@{/logout}" class="logout-link">ログアウトして最初からやり直す</a>
    </div>
  </div>

  <script>
    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');
      btn.classList.add('active');
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:with="theme=${session.theme ?: 'light'}"
      th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週間プログラム設定 - トレーニング管理システム</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-secondary">
    <header th:replace="~{common :: headerFragment}"></header>

    <main class="main-content">
        <div class="content-wrapper" style="max-width: 700px; margin: 0 auto; padding: 24px 16px;">

            <div class="mb-6">
                <h1 class="text-3xl font-bold text-primary">週間プログラム設定</h1>
                <p class="text-muted mt-2">曜日ごとにトレーニング部位とテンプレートを設定します</p>
            </div>

            <div th:if="${successMessage}" class="alert alert-success mb-4" th:text="${successMessage}"></div>

            <!-- テンプレートデータを JavaScript へ渡す -->
            <script th:inline="javascript">
                const ALL_TEMPLATES = /*[[${templates}]]*/ [];
            </script>

            <div class="card">
                <div class="card-body">
                    <form th:action="@{/user/weekly-program}" method="post" class="space-y-3">

                        <div class="weekly-program-grid" style="display:grid; grid-template-columns: 3rem 1fr 1fr; gap: 0.75rem; align-items: center;">

                            <!-- ヘッダー行 -->
                            <div class="text-sm font-semibold text-muted text-center">曜日</div>
                            <div class="text-sm font-semibold text-muted">部位</div>
                            <div class="text-sm font-semibold text-muted">テンプレート</div>

                            <!-- 曜日ごとの行 -->
                            <th:block th:each="i : ${#numbers.sequence(0, 6)}">
                                <!-- 曜日ラベル -->
                                <div class="text-center font-semibold"
                                     th:text="${dayLabels[i]}"
                                     th:classappend="${i >= 5} ? ' text-danger' : ' text-primary'">月</div>

                                <!-- 部位セレクト -->
                                <select class="form-control part-select"
                                        th:name="'partCode_' + ${dayCodes[i]}"
                                        th:attr="data-day=${dayCodes[i]}"
                                        onchange="onPartChange(this)">
                                    <option value="">── 休養日 ──</option>
                                    <option value="CHEST"
                                            th:selected="${settingsMap[dayCodes[i]] != null and settingsMap[dayCodes[i]].partCode == 'CHEST'}">胸</option>
                                    <option value="BACK"
                                            th:selected="${settingsMap[dayCodes[i]] != null and settingsMap[dayCodes[i]].partCode == 'BACK'}">背中</option>
                                    <option value="SHOULDER"
                                            th:selected="${settingsMap[dayCodes[i]] != null and settingsMap[dayCodes[i]].partCode == 'SHOULDER'}">肩</option>
                                    <option value="ARM"
                                            th:selected="${settingsMap[dayCodes[i]] != null and settingsMap[dayCodes[i]].partCode == 'ARM'}">腕</option>
                                    <option value="LEG"
                                            th:selected="${settingsMap[dayCodes[i]] != null and settingsMap[dayCodes[i]].partCode == 'LEG'}">脚</option>
                                </select>

                                <!-- テンプレートセレクト -->
                                <select class="form-control template-select"
                                        th:name="'templateId_' + ${dayCodes[i]}"
                                        th:attr="data-day=${dayCodes[i]},
                                                 data-selected=${settingsMap[dayCodes[i]] != null and settingsMap[dayCodes[i]].templateId != null ? settingsMap[dayCodes[i]].templateId : ''}">
                                    <option value="">テンプレートなし</option>
                                </select>
                            </th:block>
                        </div>

                        <div class="pt-4">
                            <button type="submit" class="btn btn-primary w-full">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline mr-2">
                                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                                    <polyline points="17 21 17 13 7 13 7 21"/>
                                    <polyline points="7 3 7 8 15 8"/>
                                </svg>
                                保存
                            </button>
                        </div>
                    </form>

                    <p class="text-muted text-xs mt-4">
                        ※ 設定した曜日にログインすると、menu 画面に「今日の予定」が表示されます。<br>
                        ※ テンプレートを設定すると、menu 画面から1クリックで適用できます。
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{common :: footerFragment}"></footer>
    <script th:src="@{/js/theme.js}"></script>
    <script>
        const PART_LABELS = {CHEST:'胸', BACK:'背中', SHOULDER:'肩', ARM:'腕', LEG:'脚'};

        function buildTemplateOptions(select, partCode, selectedId) {
            while (select.options.length > 1) select.remove(1);
            if (!partCode) return;
            const filtered = ALL_TEMPLATES.filter(t => t.partCode === partCode && !t.deletedAt);
            filtered.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = t.name;
                if (String(t.id) === String(selectedId)) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function onPartChange(partSelect) {
            const day = partSelect.dataset.day;
            const templateSelect = document.querySelector(`.template-select[data-day="${day}"]`);
            buildTemplateOptions(templateSelect, partSelect.value, '');
        }

        // 初期化：ページロード時に各行のテンプレートセレクトを構築
        document.querySelectorAll('.part-select').forEach(partSelect => {
            const day = partSelect.dataset.day;
            const templateSelect = document.querySelector(`.template-select[data-day="${day}"]`);
            const selectedId = templateSelect.dataset.selected;
            buildTemplateOptions(templateSelect, partSelect.value, selectedId);
        });
    </script>
</body>
</html>

<!doctype html>
<html
  lang="ja"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>パスワード再設定 - トレーニング管理システム</title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="login-container">
    <div class="login-background"></div>

    <!-- Theme Toggle -->
    <div class="theme-toggle-login">
      <button
        class="settings-btn"
        data-action="toggleTheme"
        aria-label="テーマ切り替え"
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>

    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
          </svg>
        </div>
        <h1 class="login-title">パスワード再設定</h1>
        <p class="login-subtitle">新しいパスワードを入力してください</p>
      </div>

      <!-- Error Message -->
      <div th:if="${errorMessage}" class="error-message">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="15" y1="9" x2="9" y2="15" />
          <line x1="9" y1="9" x2="15" y2="15" />
        </svg>
        <span th:text="${errorMessage}"></span>
      </div>

      <!-- Reset Password Form -->
      <form
        th:action="@{/password/reset}"
        method="post"
        class="login-form"
        id="resetPasswordForm"
      >
        <input type="hidden" name="token" th:value="${token}" />

        <div class="form-group">
          <svg
            class="form-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input
            type="password"
            name="password"
            class="form-control"
            placeholder="新しいパスワード"
            required
            minlength="8"
            autocomplete="new-password"
          />
        </div>

        <div class="form-group">
          <svg
            class="form-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input
            type="password"
            name="passwordConfirm"
            class="form-control"
            placeholder="パスワード（確認）"
            required
            minlength="8"
            autocomplete="new-password"
          />
        </div>

        <button type="submit" class="btn btn-primary login-btn">
          <span class="btn-text">パスワードを更新する</span>
          <div class="spinner"></div>
        </button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <p>ログイン画面に戻る</p>
        <a th:href="@{/login}" class="text-primary">ログイン</a>
      </div>
    </div>

    <!-- JavaScript -->
    <script th:src="@{/js/theme.js}"></script>
  </body>
</html>

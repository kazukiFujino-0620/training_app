<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" 
      th:with="theme=${session.theme ?: 'light'}" 
      th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - トレーニング管理システム</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    
    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-container">
    <div class="login-background"></div>
    
    <!-- Theme Toggle -->
    <div class="theme-toggle-login">
        <button class="settings-btn" onclick="toggleTheme()" aria-label="テーマ切り替え">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </div>
    
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
            </div>
            <h1 class="login-title">ようこそ</h1>
            <p class="login-subtitle">トレーニング管理システムにログイン</p>
        </div>
        
        <!-- Error/Success Messages -->
        <div th:if="${param.error}" class="error-message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <span>メールアドレスまたはパスワードが正しくありません</span>
        </div>
        
        <div th:if="${param.logout}" class="success-message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span>ログアウトしました</span>
        </div>
        
        <div th:if="${param.registered}" class="success-message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span>ユーザー登録が完了しました</span>
        </div>
        
        <!-- Login Form -->
        <form th:action="@{/login}" method="post" class="login-form" id="loginForm">
            <div class="form-group">
                <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <input 
                    type="email" 
                    name="username" 
                    class="form-control" 
                    placeholder="メールアドレス"
                    required
                    autocomplete="username">
            </div>
            
            <div class="form-group">
                <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input 
                    type="password" 
                    name="password" 
                    class="form-control" 
                    placeholder="パスワード"
                    required
                    autocomplete="current-password">
            </div>
            
            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember-me">
                    <span>ログイン状態を保持</span>
                </label>
                <a href="#" class="text-primary">パスワードを忘れた場合</a>
            </div>
            
            <button type="submit" class="btn btn-primary login-btn">
                <span class="btn-text">ログイン</span>
                <div class="spinner"></div>
            </button>
        </form>
        
        <!-- Social Login -->
        <div class="divider">または</div>
        
        <div class="social-login">
            <a th:href="@{/oauth2/authorization/google}" class="social-btn google-btn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Googleでログイン
            </a>
            
            <button type="button" onclick="alert('後ほど')" class="social-btn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                LINEでログイン
            </button>
        </div>
        
        <!-- Footer -->
        <div class="login-footer">
            <p>アカウントをお持ちでないですか？</p>
            <a th:href="@{/signup}" class="text-primary">新規登録</a>
            <span class="mx-2 text-muted">|</span>
            <a th:href="@{/password/forget}" class="text-primary">パスワードを忘れた方はこちら</a>
        </div>
    </div>
    
    <!-- JavaScript -->
    <script th:src="@{/js/theme.js}"></script>
    
    <script>
        // Form submission handling
        document.getElementById('loginForm').addEventListener('submit', function() {
            this.classList.add('loading');
        });
        
        // Prevent resubmission on page refresh
        if (window.history.replaceState) {
            window.history.replaceState(null, null, window.location.href);
        }
    </script>
</body>
</html>

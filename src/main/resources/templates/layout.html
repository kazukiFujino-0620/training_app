<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title + ' - トレーニング管理システム' : 'トレーニング管理システム'}">トレーニング管理システム</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <!-- Additional head content -->
    <th:block th:fragment="head"></th:block>
</head>
<body class="bg-secondary">
    <!-- Header -->
    <header th:replace="~{common :: headerFragment}"></header>
    
    <!-- Main Content -->
    <main class="main-content">
        <div class="flex">
            <!-- Sidebar (optional) -->
            <aside th:if="${showSidebar != false}" th:replace="~{common :: sidebarFragment}"></aside>
            
            <!-- Page Content -->
            <div class="flex-1">
                <div class="content-wrapper">
                    <!-- Page Header -->
                    <div th:if="${pageTitle != null}" class="mb-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <h1 class="text-3xl font-bold text-primary" th:text="${pageTitle}">ページタイトル</h1>
                                <p th:if="${pageSubtitle != null}" class="text-muted mt-2" th:text="${pageSubtitle}">ページサブタイトル</p>
                            </div>
                            <div th:if="${pageActions != null}" class="flex gap-2">
                                <th:block th:replace="${pageActions}"></th:block>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Flash Messages -->
                    <div th:if="${message != null}" class="alert alert-success fade-in">
                        <span th:text="${message}"></span>
                    </div>
                    
                    <div th:if="${error != null}" class="alert alert-danger fade-in">
                        <span th:text="${error}"></span>
                    </div>
                    
                    <div th:if="${warning != null}" class="alert alert-warning fade-in">
                        <span th:text="${warning}"></span>
                    </div>
                    
                    <div th:if="${info != null}" class="alert alert-info fade-in">
                        <span th:text="${info}"></span>
                    </div>
                    
                    <!-- Main Content Block -->
                    <th:block th:replace="${content}"></th:block>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer th:replace="~{common :: footerFragment}"></footer>

    <!-- Additional scripts -->
    <th:block th:fragment="scripts"></th:block>
</body>
</html>

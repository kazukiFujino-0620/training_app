name: Security Scan

# サプライチェーンセキュリティ用の包括的スキャン:
# - CodeQL: SAST (静的解析でセキュリティバグ検出)
# - OWASP Dependency-Check: 依存関係の既知 CVE スキャン
# - Trivy: ファイルシステム・コンテナ脆弱性スキャン
# - CycloneDX SBOM: ソフトウェア部品表生成
# - Gitleaks: コミットに含まれたシークレット検出

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  schedule:
    # 毎週月曜 03:00 JST に定期実行（新規 CVE 発見の早期検知）
    - cron: "0 18 * * 1"

# 最小権限。各ジョブで必要に応じて拡張する。
permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-extended,security-and-quality

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build
        run: mvn -B compile -DskipTests

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  dependency-check:
    name: OWASP Dependency-Check
    # NVD DBダウンロードに時間がかかるため PR では実行しない
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run OWASP Dependency-Check
        env:
          # NVD API キーで rate limit 緩和（事前に Secrets に登録）
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformats=HTML,SARIF || true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: target/dependency-check-report.sarif

      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30

  trivy:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Generate SBOM
        run: mvn -B cyclonedx:makeAggregateBom -DskipTests

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: target/bom.json
          retention-days: 90

  secret-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

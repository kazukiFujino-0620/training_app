<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:with="theme=${session.theme ?: 'light'}"
      th:attr="data-theme=${theme}">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テンプレート管理 - トレーニング管理システム</title>
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <link rel="stylesheet" th:href="@{/css/main.css}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="bg-secondary">
  <header th:replace="~{common :: headerFragment}"></header>

  <main class="main-content" style="padding-top: 4rem;">
    <div class="template-page">

      <div class="page-header">
        <h1>テンプレート管理</h1>
        <button class="btn btn-primary" onclick="openCreateModal()">＋ 作成</button>
      </div>

      <!-- テンプレートなし -->
      <div th:if="${#lists.isEmpty(templates)}" style="text-align:center; padding:3rem 1rem; color:var(--text-muted);">
        <p>テンプレートがまだありません。</p>
        <p style="font-size:0.9rem;">「＋ 作成」ボタンからよく使う種目セットを登録できます。</p>
      </div>

      <!-- テンプレート一覧 -->
      <div class="template-grid">
        <div th:each="tmpl : ${templates}" class="template-card">
          <div class="template-card-header">
            <div class="template-card-name" th:text="${tmpl.name}">テンプレート名</div>
            <div class="template-card-part" th:text="${tmpl.partCode}">部位</div>
          </div>
          <div class="template-card-body">
            <div th:each="item : ${tmpl.items}" class="template-item-row">
              <span th:text="${item.itemName}">種目名</span>
              <span>
                Set<span th:text="${item.setNumber}">1</span>
                <span th:text="'[' + ${item.setType} + ']'">[MAIN]</span>
                <span th:if="${item.weight != null}" th:text="${item.weight + 'kg'}"></span>
                <span th:if="${item.reps != null}" th:text="${' × ' + item.reps + '回'}"></span>
              </span>
            </div>
            <div th:if="${#lists.isEmpty(tmpl.items)}" style="color:var(--text-muted); font-size:0.85rem;">
              種目が登録されていません
            </div>
          </div>
          <div class="template-card-actions">
            <button class="btn btn-primary btn-sm"
                    th:onclick="'applyTemplateToday(' + ${tmpl.id} + ')'">今日に適用</button>
            <button class="btn btn-secondary btn-sm"
                    th:onclick="'openEditModal(' + ${tmpl.id} + ')'">編集</button>
            <button class="btn btn-danger btn-sm"
                    th:onclick="'deleteTemplateById(' + ${tmpl.id} + ')'">削除</button>
          </div>
        </div>
      </div>

      <a th:href="@{/menu}" class="btn btn-secondary" style="margin-top:1rem; display:block; text-align:center;">
        ← メニューに戻る
      </a>

    </div>
  </main>

  <!-- 作成・編集モーダル -->
  <div id="templateModal" class="template-modal-overlay hidden">
    <div class="template-modal-content">
      <h3 id="templateModalTitle">テンプレートを作成</h3>

      <div class="form-group" style="margin-top:1rem;">
        <label class="form-label">テンプレート名 <span style="color:red;">*</span></label>
        <input type="text" id="tplName" class="form-input" placeholder="例: 胸の日A" maxlength="100">
      </div>

      <div class="form-group">
        <label class="form-label">部位</label>
        <select id="tplPartCode" class="form-select">
          <option value="CHEST">胸</option>
          <option value="BACK">背中</option>
          <option value="SHOULDER">肩</option>
          <option value="ARM">腕</option>
          <option value="LEG">脚</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">メモ</label>
        <input type="text" id="tplMemo" class="form-input" placeholder="任意" maxlength="500">
      </div>

      <div class="form-group">
        <label class="form-label">種目・セット構成</label>
        <div class="template-item-builder" id="tplItemBuilder">
          <!-- 行はJSで動的生成 -->
        </div>
        <button type="button" class="btn btn-outline w-full" onclick="addTplItemRow()" style="margin-top:0.5rem;">
          ＋ セットを追加
        </button>
      </div>

      <div style="display:flex; justify-content:space-between; margin-top:1.5rem; gap:0.5rem;">
        <button type="button" class="btn btn-secondary" onclick="closeTemplateModal()">キャンセル</button>
        <button type="button" class="btn btn-primary" onclick="saveTemplate()">保存</button>
      </div>
    </div>
  </div>

  <script th:src="@{/js/theme.js}"></script>
  <script>
  let editingTemplateId = null;

  function getCsrf() {
    return {
      token: document.querySelector('meta[name="_csrf"]')?.content || '',
      header: document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN'
    };
  }

  function setTypeLabelHtml(st) {
    const map = { WARMUP: { label: 'WU', cls: 'tpl-badge-warmup' }, MAIN: { label: 'SET', cls: 'tpl-badge-main' }, DROP: { label: 'DROP', cls: 'tpl-badge-drop' } };
    const info = map[st] || map.MAIN;
    return `<button type="button" class="tpl-badge-btn ${info.cls}" data-set-type="${st}" onclick="cycleTplBadge(this)">${info.label}</button>`;
  }

  function cycleTplBadge(btn) {
    const cycle = { MAIN: 'DROP', DROP: 'WARMUP', WARMUP: 'MAIN' };
    const next = cycle[btn.dataset.setType] || 'MAIN';
    const map = { WARMUP: { label: 'WU', cls: 'tpl-badge-warmup' }, MAIN: { label: 'SET', cls: 'tpl-badge-main' }, DROP: { label: 'DROP', cls: 'tpl-badge-drop' } };
    const info = map[next];
    btn.dataset.setType = next;
    btn.textContent = info.label;
    btn.className = `tpl-badge-btn ${info.cls}`;
  }

  function addTplItemRow(itemName, setNum, setType, weight, reps) {
    const builder = document.getElementById('tplItemBuilder');
    const rowCount = builder.children.length;
    const st = setType || 'MAIN';
    const div = document.createElement('div');
    div.className = 'template-item-builder-row';
    div.innerHTML = `
      <input type="text" class="tpl-input tpl-item-name" placeholder="種目名" value="${itemName || ''}" maxlength="100">
      ${setTypeLabelHtml(st)}
      <input type="number" class="tpl-input tpl-input-sm tpl-weight" placeholder="kg" step="0.5" value="${weight || ''}">
      <span style="font-size:0.8rem; color:var(--text-muted);">×</span>
      <input type="number" class="tpl-input tpl-input-sm tpl-reps" placeholder="回" value="${reps || ''}">
      <button type="button" style="color:#f44336; border:none; background:none; cursor:pointer; font-size:1rem;" onclick="this.closest('.template-item-builder-row').remove()">✕</button>
    `;
    builder.appendChild(div);
  }

  function openCreateModal() {
    editingTemplateId = null;
    document.getElementById('templateModalTitle').textContent = 'テンプレートを作成';
    document.getElementById('tplName').value = '';
    document.getElementById('tplPartCode').value = 'CHEST';
    document.getElementById('tplMemo').value = '';
    document.getElementById('tplItemBuilder').innerHTML = '';
    addTplItemRow();
    document.getElementById('templateModal').classList.remove('hidden');
  }

  function openEditModal(templateId) {
    fetch('/api/templates')
      .then(r => r.json())
      .then(templates => {
        const tmpl = templates.find(t => t.id === templateId);
        if (!tmpl) return;
        editingTemplateId = templateId;
        document.getElementById('templateModalTitle').textContent = 'テンプレートを編集';
        document.getElementById('tplName').value = tmpl.name || '';
        document.getElementById('tplPartCode').value = tmpl.partCode || 'CHEST';
        document.getElementById('tplMemo').value = tmpl.memo || '';
        document.getElementById('tplItemBuilder').innerHTML = '';
        (tmpl.items || []).forEach(item => {
          addTplItemRow(item.itemName, item.setNumber, item.setType, item.weight, item.reps);
        });
        if (!tmpl.items || tmpl.items.length === 0) addTplItemRow();
        document.getElementById('templateModal').classList.remove('hidden');
      });
  }

  function closeTemplateModal() {
    document.getElementById('templateModal').classList.add('hidden');
  }

  function saveTemplate() {
    const name = document.getElementById('tplName').value.trim();
    if (!name) { alert('テンプレート名を入力してください。'); return; }

    const partCode = document.getElementById('tplPartCode').value;
    const memo = document.getElementById('tplMemo').value.trim();

    const rows = document.querySelectorAll('#tplItemBuilder .template-item-builder-row');
    const items = [];
    let displayOrder = 0;
    rows.forEach((row, idx) => {
      const itemName = row.querySelector('.tpl-item-name')?.value.trim();
      if (!itemName) return;
      const badge = row.querySelector('.tpl-badge-btn');
      const setType = badge?.dataset.setType || 'MAIN';
      const weight = row.querySelector('.tpl-weight')?.value;
      const reps = row.querySelector('.tpl-reps')?.value;
      items.push({
        itemName,
        setNumber: idx + 1,
        setType,
        weight: weight ? parseFloat(weight) : null,
        reps: reps ? parseInt(reps, 10) : null,
        displayOrder: displayOrder++
      });
    });

    const csrf = getCsrf();
    const url = editingTemplateId ? `/api/templates/${editingTemplateId}/update` : '/api/templates';
    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', [csrf.header]: csrf.token },
      body: JSON.stringify({ name, partCode, memo, items })
    }).then(r => {
      if (r.ok) { closeTemplateModal(); location.reload(); }
      else { alert('保存に失敗しました。'); }
    }).catch(() => alert('通信エラーが発生しました。'));
  }

  function deleteTemplateById(templateId) {
    if (!confirm('このテンプレートを削除しますか？')) return;
    const csrf = getCsrf();
    fetch(`/api/templates/${templateId}/delete`, {
      method: 'POST',
      headers: { [csrf.header]: csrf.token }
    }).then(r => {
      if (r.ok) location.reload();
      else alert('削除に失敗しました。');
    });
  }

  function applyTemplateToday(templateId) {
    const today = new Date().toISOString().split('T')[0];
    const csrf = getCsrf();
    fetch(`/api/templates/${templateId}/apply`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', [csrf.header]: csrf.token },
      body: JSON.stringify({ date: today })
    }).then(r => {
      if (!r.ok) { alert('適用に失敗しました。'); return; }
      return r.json();
    }).then(data => {
      if (!data) return;
      if (data.duplicateItems && data.duplicateItems.length > 0) {
        alert('以下の種目は当日すでに追加されています:\n' + data.duplicateItems.join('\n') + '\n\n重複を許可して追加しました。');
      }
      window.location.href = '/start/training?date=' + today;
    }).catch(() => alert('通信エラーが発生しました。'));
  }

  // モーダル外クリックで閉じる
  document.getElementById('templateModal').addEventListener('click', function(e) {
    if (e.target === this) closeTemplateModal();
  });
  </script>

  <div th:replace="~{common :: sessionModalsFragment}"></div>
</body>
</html>

description: 退会申請リクエスト
content:
  application/json:
    schema:
      type: object
      properties:
        reasonType:
          type: string
          nullable: true
          enum: [NO_LONGER_USED, SWITCHING_SERVICE, OTHER]
          description: 退会理由の種別（任意）
          example: "NO_LONGER_USED"
        reasonText:
          type: string
          nullable: true
          maxLength: 500
          description: 退会理由の詳細テキスト（任意、500文字以内）
          example: "利用頻度が減ったため"
        confirmed:
          type: boolean
          description: 「全データが削除されます」の確認チェック（必須）
          example: true
      required:
        - confirmed

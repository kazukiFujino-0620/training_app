<!doctype html>
<html
  lang="ja"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:with="theme=${session.theme ?: 'light'}"
  th:attr="data-theme=${theme}"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自己記録（PR）- トレーニング管理システム</title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-secondary">
    <header th:replace="~{common :: headerFragment}"></header>

    <main style="max-width:900px;margin:0 auto;padding:24px 16px;">

      <!-- タイトルエリア -->
      <div style="display:flex;align-items:center;justify-content:space-between;
                  margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <div>
          <h1 style="color:#f1f5f9;font-size:1.5rem;font-weight:700;margin:0;">
            自己記録（PR）
          </h1>
          <p style="color:#64748b;font-size:0.85rem;margin:4px 0 0;">
            各種目の最高重量・最高回数の記録
          </p>
        </div>
        <a th:href="@{/menu}"
           style="background:rgba(255,255,255,0.07);color:#94a3b8;
                  border:1px solid rgba(255,255,255,0.1);border-radius:8px;
                  padding:8px 16px;font-size:0.85rem;text-decoration:none;">
          ← メニューへ戻る
        </a>
      </div>

      <!-- PRカード -->
      <div style="background:#1a1f26;border-radius:16px;overflow:hidden;
                  box-shadow:0 4px 32px rgba(0,0,0,0.4);">

        <!-- データあり -->
        <div th:if="${not #lists.isEmpty(records)}">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="border-bottom:1px solid rgba(255,255,255,0.07);">
                <th style="padding:14px 20px;text-align:left;color:#64748b;
                           font-size:0.8rem;font-weight:600;letter-spacing:0.05em;">
                  種目名
                </th>
                <th style="padding:14px 20px;text-align:right;color:#64748b;
                           font-size:0.8rem;font-weight:600;letter-spacing:0.05em;">
                  最高重量
                </th>
                <th style="padding:14px 20px;text-align:right;color:#64748b;
                           font-size:0.8rem;font-weight:600;letter-spacing:0.05em;">
                  最高回数
                </th>
                <th style="padding:14px 20px;text-align:right;color:#64748b;
                           font-size:0.8rem;font-weight:600;letter-spacing:0.05em;">
                  達成日
                </th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="record, stat : ${records}"
                  th:style="${stat.odd} ? 'background:rgba(255,255,255,0.02)' : ''">
                <td style="padding:14px 20px;color:#f1f5f9;font-size:0.9rem;font-weight:500;">
                  <span th:text="${record.itemName}"></span>
                </td>
                <td style="padding:14px 20px;text-align:right;color:#34d399;
                           font-size:0.95rem;font-weight:700;">
                  <span th:text="${record.maxWeight + ' kg'}"></span>
                </td>
                <td style="padding:14px 20px;text-align:right;color:#60a5fa;
                           font-size:0.95rem;font-weight:700;">
                  <span th:text="${record.maxReps + ' 回'}"></span>
                </td>
                <td style="padding:14px 20px;text-align:right;color:#94a3b8;font-size:0.85rem;">
                  <span th:text="${#temporals.format(record.achievedDate, 'yyyy-MM-dd')}"></span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- データなし -->
        <div th:if="${#lists.isEmpty(records)}"
             style="padding:80px 20px;text-align:center;">
          <p style="color:#475569;font-size:0.95rem;margin:0;">
            まだPRが記録されていません
          </p>
          <p style="color:#334155;font-size:0.85rem;margin:8px 0 0;">
            トレーニングを保存すると自動で記録されます
          </p>
        </div>

      </div>

      <!-- 件数表示 -->
      <p th:if="${not #lists.isEmpty(records)}"
         style="text-align:right;color:#475569;font-size:0.8rem;margin-top:12px;">
        <span th:text="${#lists.size(records)}"></span> 種目
      </p>

    </main>

    <footer th:replace="~{common :: footerFragment}"></footer>
  </body>
</html>

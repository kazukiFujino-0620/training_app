<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:with="theme=${session.theme ?: 'light'}"
      th:attr="data-theme=${theme}">
<head>
  <meta charset="UTF-8" />    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>プロフィール - トレーニング管理システム</title>
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <link rel="stylesheet" th:href="@{/css/main.css}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .profile-page { max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
    .page-header { margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.4rem; font-weight: 700; margin: 0; color: var(--text-primary); }

    .profile-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .card-header {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-tertiary);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .card-body { padding: 1.25rem 1rem; }

    .form-field { margin-bottom: 1.1rem; }
    .form-field:last-child { margin-bottom: 0; }
    .form-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
      letter-spacing: 0.03em;
    }
    .form-input {
      width: 100%;
      padding: 0.6rem 0.85rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text-primary);
      box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--primary-color);
    }
    .form-select {
      width: 100%;
      padding: 0.6rem 0.85rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text-primary);
      box-sizing: border-box;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .form-select:focus {
      outline: none;
      border-color: var(--primary-color);
    }
    .field-error {
      display: block;
      font-size: 0.78rem;
      color: var(--danger-color, #e53e3e);
      margin-top: 0.3rem;
    }

    .bmi-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .bmi-label { font-size: 0.82rem; color: var(--text-muted); font-weight: 600; }
    .bmi-value { font-size: 2rem; font-weight: 700; color: var(--primary-color); line-height: 1; }
    .bmi-unit { font-size: 0.75rem; color: var(--text-muted); }

    .success-alert {
      background: var(--bg-tertiary);
      border: 1px solid var(--success-color, #38a169);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      color: var(--success-color, #38a169);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .action-area { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
  </style>
</head>
<body class="bg-secondary">
  <header th:replace="~{common :: headerFragment}"></header>

  <main class="main-content" style="padding-top: 4rem;">
    <div class="profile-page">

      <!-- ページヘッダー -->
      <div class="page-header">
        <h1>プロフィール</h1>
      </div>

      <!-- フラッシュメッセージ -->
      <div class="success-alert" th:if="${successMessage}" th:text="${successMessage}"></div>

      <!-- BMIカード（身長・体重が入力済みの場合のみ表示） -->
      <div class="bmi-card"
           th:if="${user.weightKg != null and user.heightCm != null}">
        <div>
          <div class="bmi-label">BMI</div>
          <div class="bmi-value"
               th:with="bmi=${user.weightKg / ((user.heightCm / 100) * (user.heightCm / 100))}"
               th:text="${#numbers.formatDecimal(bmi, 1, 1)}">
            0.0
          </div>
          <div class="bmi-unit">kg/m²</div>
        </div>
        <div style="font-size:0.82rem; color:var(--text-muted); line-height:1.6;">
          <span th:with="bmi=${user.weightKg / ((user.heightCm / 100) * (user.heightCm / 100))}">
            <span th:if="${bmi < 18.5}">低体重</span>
            <span th:if="${bmi >= 18.5 and bmi < 25.0}">普通体重</span>
            <span th:if="${bmi >= 25.0 and bmi < 30.0}">肥満(1度)</span>
            <span th:if="${bmi >= 30.0}">肥満(2度以上)</span>
          </span><br>
          <span th:text="'身長 ' + ${user.heightCm} + ' cm / 体重 ' + ${user.weightKg} + ' kg'"></span>
        </div>
      </div>

      <!-- プロフィールフォーム -->
      <form th:action="@{/user/profile}" th:object="${profileForm}" method="post">
        <!-- CSRF -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <!-- 基本情報 -->
        <div class="profile-card">
          <div class="card-header">基本情報</div>
          <div class="card-body">

            <div class="form-field">
              <label class="form-label" for="userName">ユーザー名</label>
              <input type="text"
                     id="userName"
                     th:field="*{userName}"
                     class="form-input"
                     placeholder="ユーザー名を入力" />
              <span class="field-error"
                    th:if="${#fields.hasErrors('userName')}"
                    th:errors="*{userName}"></span>
            </div>

            <div class="form-field">
              <label class="form-label" for="gender">性別</label>
              <select id="gender"
                      th:field="*{gender}"
                      class="form-select">
                <option value="">選択してください</option>
                <option value="MALE">男性</option>
                <option value="FEMALE">女性</option>
                <option value="UNSPECIFIED">回答しない</option>
              </select>
              <span class="field-error"
                    th:if="${#fields.hasErrors('gender')}"
                    th:errors="*{gender}"></span>
            </div>

            <div class="form-field">
              <label class="form-label" for="birthDate">生年月日</label>
              <input type="date"
                     id="birthDate"
                     th:field="*{birthDate}"
                     class="form-input" />
              <span class="field-error"
                    th:if="${#fields.hasErrors('birthDate')}"
                    th:errors="*{birthDate}"></span>
            </div>

          </div>
        </div>

        <!-- 身体情報 -->
        <div class="profile-card">
          <div class="card-header">身体情報</div>
          <div class="card-body">

            <div class="form-field">
              <label class="form-label" for="heightCm">身長 (cm)</label>
              <input type="number"
                     id="heightCm"
                     th:field="*{heightCm}"
                     class="form-input"
                     step="0.1"
                     min="100"
                     max="250"
                     placeholder="例: 170.5" />
              <span class="field-error"
                    th:if="${#fields.hasErrors('heightCm')}"
                    th:errors="*{heightCm}"></span>
            </div>

            <div class="form-field">
              <label class="form-label" for="weightKg">体重 (kg)</label>
              <input type="number"
                     id="weightKg"
                     th:field="*{weightKg}"
                     class="form-input"
                     step="0.1"
                     min="20"
                     max="300"
                     placeholder="例: 65.0" />
              <span class="field-error"
                    th:if="${#fields.hasErrors('weightKg')}"
                    th:errors="*{weightKg}"></span>
            </div>

          </div>
        </div>

        <!-- アクション -->
        <div class="action-area">
          <button type="submit" class="btn btn-primary w-full py-3 font-bold">
            プロフィールを保存
          </button>
          <a th:href="@{/menu}" class="btn btn-secondary w-full text-center">
            ← メニューに戻る
          </a>
        </div>

      </form>

    </div><!-- /profile-page -->
  </main>

</body>
</html>

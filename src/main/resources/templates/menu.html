<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="theme=${session.theme ?: 'light'}" 
      th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メインメニュー - トレーニング管理システム</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    
    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/training_modal.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-secondary">
    <!-- Header -->
    <header th:replace="~{common :: headerFragment}"></header>
    
    <!-- Main Content -->
    <main class="main-content">
        <div class="content-wrapper">
            <!-- Page Header -->
            <div class="mb-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold text-primary">トレーニングメニュー</h1>
                        <p class="text-muted mt-2">今日のトレーニングを記録・管理しましょう</p>
                    </div>
                </div>
            </div>
            
            <!-- Flash Messages -->
            <div th:if="${message != null}" class="alert alert-success fade-in">
                <span th:text="${message}"></span>
            </div>
            
            <div th:if="${error != null}" class="alert alert-danger fade-in">
                <span th:text="${error}"></span>
            </div>
            
            <!-- Main Content -->
            <div class="flex gap-6">
                <!-- Calendar Section -->
                <div class="flex-1 max-w-2xl">
                    <div class="card">
                        <div class="card-header">
                            <div class="flex items-center justify-between">
                                <a th:href="@{/menu(date=${prevMonth})}" class="btn btn-secondary btn-sm">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="15 18 9 12 15 6"/>
                                    </svg>
                                    前月
                                </a>
                                <h2 class="text-xl font-semibold" th:text="${targetMonth.year} + '年' + ${targetMonth.monthValue} + '月'">2024年3月</h2>
                                <a th:href="@{/menu(date=${nextMonth})}" class="btn btn-secondary btn-sm">
                                    次月
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="9 18 15 12 9 6"/>
                                    </svg>
                                </a>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="calendar-container">
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th>月</th>
                                            <th>火</th>
                                            <th>水</th>
                                            <th>木</th>
                                            <th>金</th>
                                            <th class="text-primary">土</th>
                                            <th class="text-danger">日</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="i : ${#numbers.sequence(0, 5)}">
                                            <td th:each="j : ${#numbers.sequence(0, 6)}" 
                                                th:with="index=${i * 7 + j}, day=${dateList[index]}, isDone=${dayStatusList[index]}"
                                                class="calendar-cell cursor-pointer hover:bg-tertiary transition-colors"
                                                th:classappend="${day == today} ? 'bg-primary bg-opacity-20 font-bold' : ''"
                                                th:onclick="selectDate([[${#temporals.format(day, 'yyyy-MM-dd')}]])">
                                                
                                                <div class="text-center p-2">
                                                    <span th:text="${day.dayOfMonth}" 
                                                          th:class="${day.month != targetMonth.month} ? 'text-muted' : ''">1</span>
                                                    
                                                    <div class="mt-1">
                                                        <div th:if="${isDone == 'COMPLETED'}" class="text-success text-xs">✅</div>
                                                        <div th:if="${isDone == 'IN_PROGRESS'}" class="text-warning text-xs">🔥</div>
                                                    </div>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Training Summary Section -->
                <div class="flex-1 max-w-2xl">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="text-xl font-semibold">
                                <span th:text="${selectedDate != null ? selectedDate : today}">2026-03-07</span> のトレーニングサマリー
                            </h3>
                        </div>
                        <div class="card-body">
                            <div th:if="${not #lists.isEmpty(trainingList)}">
                                <div class="space-y-4">
                                    <div th:each="item : ${trainingList}" class="flex items-center gap-4 p-4 bg-tertiary rounded-lg">
                                        <div class="flex-1">
                                            <div class="flex items-center gap-2 mb-2">
                                                <strong th:text="${item.menu}" class="text-lg">種目名</strong>
                                                <span class="text-sm text-muted" th:text="'(' + ${item.partName} + ')'">(部位)</span>
                                            </div>
                                            
                                            <div class="space-y-1">
                                                <div th:each="detail : ${item.details}" class="flex items-center gap-3 text-sm">
                                                    <span class="font-medium" th:text="${detail.setNumber} + 'セット目:'">1セット目:</span>
                                                    <span th:text="${detail.weight} + ' kg'">0 kg</span>
                                                    <span>×</span>
                                                    <span th:text="${detail.reps} + '回'">0回</span>
                                                    
                                                    <span th:if="${detail.isCompleted}" class="text-success font-bold ml-2">✓</span>
                                                    <span th:if="${!detail.isCompleted}" class="text-muted ml-2">○</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="flex items-center gap-3">
                                            <div th:if="${item.isAllCompleted}"
                                                 class="w-8 h-8 bg-success text-white rounded-full flex items-center justify-center font-bold text-sm">
                                                ✓
                                            </div>
                                            <div th:if="${!item.isAllCompleted}"
                                                 class="w-8 h-8 bg-card border-2 border-muted rounded-full flex items-center justify-center font-bold text-sm text-muted">
                                                ✓
                                            </div>
                                            
                                            <div class="flex flex-col gap-2">
                                                <button type="button" th:onclick="openEditModal([[${item.id}]], [[${item.menu}]], [[${item.partCode}]], [[${item.trainingDate}]], [[${item.details}]])" 
                                                        class="btn btn-secondary btn-sm">
                                                    編集
                                                </button>
                                                <form th:action="@{/menu/delete}" method="post" onsubmit="return confirm('本当に削除しますか？');" class="m-0">
                                                    <input type="hidden" name="id" th:value="${item.id}">
                                                    <button type="submit" class="btn btn-danger btn-sm w-full">
                                                        削除
                                                    </button>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <button th:onclick="openRegisterPage([[${selectedDate != null ? selectedDate : today}]])" 
                                        class="btn btn-outline w-full mt-4">
                                    ＋ 他の種目を追加登録
                                </button>
                                
                                <div th:if="${!isDailyCompleted}" class="mt-6 pt-6 border-t border-border">
                                    <form th:action="@{/start/training}" method="get">
                                        <input type="hidden" name="date" th:value="${selectedDate != null ? selectedDate : today}">
                                        
                                        <button type="submit" 
                                                th:class="'btn w-full py-4 font-bold text-lg transition-all ' + 
                                                         (${totalCount > 0} ? 'btn-warning' : 'btn-secondary')">
                                            <span th:if="${totalCount == 0}">トレーニングを開始する</span>
                                            <span th:if="${totalCount > 0}">
                                                トレーニングを継続 (残り [[${totalCount - completedCount}]] 種目)
                                            </span>
                                        </button>
                                    </form>
                                </div>
                                
                                <div th:if="${isDailyCompleted}" class="mt-6 pt-6 border-t border-border text-center">
                                    <p class="text-muted mb-4">本日のトレーニングはすべて完了しました！</p>
                                    <form th:action="@{/detail}" method="get">
                                        <input type="hidden" name="date" th:value="${selectedDate != null ? selectedDate : today}">
                                        <button type="submit" class="btn btn-success w-full py-4 font-bold text-lg">
                                            本日のトレーニング詳細を表示
                                        </button>
                                    </form>
                                </div>
                            </div>

                            <div th:if="${#lists.isEmpty(trainingList)}" class="text-center py-12">
                                <div class="text-muted mb-4">
                                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mx-auto mb-4">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                        <polyline points="14 2 14 8 20 8"/>
                                        <line x1="16" y1="13" x2="8" y2="13"/>
                                        <line x1="16" y1="17" x2="8" y2="17"/>
                                        <polyline points="10 9 9 9 8 9"/>
                                    </svg>
                                    <p class="text-lg">この日のトレーニング記録はありません。</p>
                                </div>
                                <button th:onclick="openRegisterPage([[${selectedDate != null ? selectedDate : today}]])" 
                                        class="btn btn-primary mt-4">
                                    記録を付ける
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Admin Section -->
            <div sec:authorize="hasRole('ADMIN')" class="mt-8">
                <div class="card">
                    <div class="card-header">
                        <div class="flex items-center gap-2">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                                <line x1="12" y1="9" x2="12" y2="13"/>
                                <line x1="12" y1="17" x2="12.01" y2="17"/>
                            </svg>
                            <strong class="font-bold">管理者メニュー</strong>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <a th:href="@{/admin/all-users-training}" 
                               target="_blank" 
                               rel="noopener noreferrer"
                               class="btn btn-warning w-full">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline mr-2">
                                    <path d="M9 11H3v2h6v-2zm0-4H3v2h6V7zm0 8H3v2h6v-2zm12-8h-6v2h6V7zm0 4h-6v2h6v-2zm0 4h-6v2h6v-2z"/>
                                </svg>
                                全ユーザのトレーニング確認
                            </a>
                            <a th:href="@{/admin/users}" class="btn btn-outline w-full mt-2">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline mr-2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                                ユーザー権限・ステータス管理
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer th:replace="~{common :: footerFragment}"></footer>

    <!-- Training Edit Modal -->
    <div id="editTrainingModal" class="hidden fixed inset-0 bg-modal flex items-center justify-center z-50">
        <div class="bg-card rounded-xl p-8 max-w-2xl w-full max-h-[80vh] overflow-y-auto m-4">
            <h3 id="editModalTitle" class="text-xl font-bold mb-6">トレーニング編集</h3>
            
            <div id="editSetsContainer" class="mb-6">
                <!-- セット一覧がここに表示される -->
            </div>
            
            <div class="flex gap-4 justify-end">
                <button type="button" onclick="closeEditModal()" class="btn btn-secondary">
                    キャンセル
                </button>
                <button type="button" onclick="saveEditModal()" class="btn btn-success">
                    保存
                </button>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/training-modal.js}"></script>
    
    <script>
        // Load saved theme on page load
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('training-app-theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        });
        
        // Select date function to show summary
        function selectDate(dateString) {
            // Check if dateString is valid
            if (!dateString || dateString === 'undefined-undefined-undefined') {
                console.error('Invalid date string:', dateString);
                return;
            }
            
            // Redirect to menu with selected date parameter
            window.location.href = '/menu?date=' + dateString;
        }
    </script>
</body>
</html>

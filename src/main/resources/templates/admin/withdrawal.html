<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:with="theme=${session.theme ?: 'light'}"
      th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退会申請管理 - トレーニング管理システム</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-secondary">
    <header th:replace="~{common :: headerFragment}"></header>

    <main class="main-content">
        <div class="content-wrapper">
            <div class="mb-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold text-primary">退会申請管理</h1>
                        <p class="text-muted mt-2">ユーザーからの退会申請を承認または拒否します</p>
                    </div>
                    <a href="/admin" class="btn btn-secondary">管理者メニューへ</a>
                </div>
            </div>

            <!-- フラッシュメッセージ -->
            <div th:if="${successMessage}" class="alert alert-success mb-4" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger mb-4" th:text="${errorMessage}"></div>

            <div class="card">
                <div class="card-header">
                    <h2 class="text-xl font-semibold">申請一覧（申請中）</h2>
                </div>
                <div class="card-body">
                    <!-- 申請がない場合 -->
                    <div th:if="${#lists.isEmpty(requests)}" style="text-align: center; padding: 40px; color: var(--text-muted);">
                        現在申請中の退会申請はありません
                    </div>

                    <!-- 申請一覧テーブル -->
                    <div th:if="${!#lists.isEmpty(requests)}" class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>申請者</th>
                                    <th>メールアドレス</th>
                                    <th>退会理由</th>
                                    <th>申請日時</th>
                                    <th style="text-align: center; min-width: 200px;">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${requests}">
                                    <td th:text="${item.user != null ? item.user.userName : '不明'}"></td>
                                    <td th:text="${item.user != null ? item.user.email : '不明'}"></td>
                                    <td>
                                        <span th:switch="${item.request.reasonType}">
                                            <span th:case="'NO_LONGER_USED'">使わなくなった</span>
                                            <span th:case="'SWITCHING_SERVICE'">別のサービスに移行</span>
                                            <span th:case="'OTHER'">その他</span>
                                            <span th:case="*">未記入</span>
                                        </span>
                                        <div th:if="${item.request.reasonText != null && !item.request.reasonText.isEmpty()}"
                                             style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;"
                                             th:text="${item.request.reasonText}"></div>
                                    </td>
                                    <td th:text="${#temporals.format(item.request.requestedAt, 'yyyy/MM/dd HH:mm')}"></td>
                                    <td style="text-align: center;">
                                        <div style="display: flex; gap: 8px; justify-content: center;">
                                            <!-- 承認ボタン -->
                                            <form th:action="@{/admin/withdrawal/{id}/approve(id=${item.request.id})}" method="post"
                                                  th:id="'approveForm-' + ${item.request.id}">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                <button type="button" class="btn btn-danger btn-sm"
                                                        th:onclick="'confirmApprove(' + ${item.request.id} + ', \'' + ${item.user != null ? item.user.userName : '不明'} + '\')'">
                                                    承認（削除）
                                                </button>
                                            </form>
                                            <!-- 拒否ボタン -->
                                            <form th:action="@{/admin/withdrawal/{id}/reject(id=${item.request.id})}" method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                <button type="submit" class="btn btn-secondary btn-sm"
                                                        onclick="return confirm('この申請を拒否しますか？')">
                                                    拒否
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 承認確認モーダル -->
    <div id="approveModal" class="modal-overlay hidden" role="dialog" aria-modal="true">
        <div class="modal-content" style="max-width: 480px; text-align: center;">
            <h3 style="color: var(--danger-color);">退会申請の承認</h3>
            <p id="approveModalMessage" style="margin: 16px 0;"></p>
            <div style="background: var(--danger-bg, #fff5f5); border: 1px solid var(--danger-color); border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 0.85rem; text-align: left;">
                <p style="color: var(--danger-color); font-weight: 600; margin-bottom: 6px;">削除されるデータ</p>
                <ul style="color: var(--danger-color); padding-left: 18px; margin: 0;">
                    <li>全てのトレーニング記録</li>
                    <li>自己記録（PR）</li>
                    <li>トレーニング目標</li>
                    <li>2要素認証設定</li>
                    <li>アカウント情報（論理削除）</li>
                </ul>
            </div>
            <p style="color: var(--danger-color); font-weight: 600; margin-bottom: 20px;">この操作は取り消せません。</p>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button id="approveConfirmBtn" class="btn btn-danger">承認して削除する</button>
                <button onclick="closeApproveModal()" class="btn btn-secondary">キャンセル</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/theme.js}"></script>
    <script>
        var pendingApproveFormId = null;

        function confirmApprove(requestId, userName) {
            pendingApproveFormId = 'approveForm-' + requestId;
            document.getElementById('approveModalMessage').textContent =
                userName + ' さんの退会申請を承認します。全てのデータが削除されます。';
            document.getElementById('approveModal').classList.remove('hidden');
        }

        function closeApproveModal() {
            document.getElementById('approveModal').classList.add('hidden');
            pendingApproveFormId = null;
        }

        document.getElementById('approveConfirmBtn').addEventListener('click', function() {
            if (pendingApproveFormId) {
                document.getElementById(pendingApproveFormId).submit();
            }
        });
    </script>
    <div th:replace="~{common :: sessionModalsFragment}"></div>
</body>
</html>

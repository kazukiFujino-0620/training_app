spring.application.name=TraningApp

# Jackson: LocalDate を ISO 文字列として扱う（"2026-05-28" 形式）
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Application Base URL for email links
# Default to localhost for local development, can be overridden by environment variable
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Performance optimizations
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=false

# JPA settings (MySQL)
# ★ SECURITY: ddl-auto は本番環境では 'validate' を推奨
# - development: update（開発時スキーマ自動更新）
# - production: validate（スキーマ検証のみ、自動変更なし）
# 本番データベースは手動マイグレーション + validate 設定で保護
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
server.forward-headers-strategy=native
# セッションタイムアウト（明示的に設定して環境差異を防ぐ）
server.servlet.session.timeout=30m

# ── セッション Cookie のセキュリティ ─────────────────────────────────
# 本番は HTTPS のみ送信、ローカルは secure を環境変数で false にして開発可能にする
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
# CSRF とユーザビリティのバランス: lax （標準的な安全側）
server.servlet.session.cookie.same-site=lax

# ── エラーレスポンスの情報漏洩防止 ─────────────────────────────────
# スタックトレース・例外メッセージ・バインディングエラー詳細を一律レスポンスから除外。
# クライアントへの情報漏洩を防ぎ、攻撃者の偵察を困難にする。
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# ── リクエストサイズ制限（DoS / メモリ枯渇対策） ────────────────────
# JSON 等のリクエストサイズ上限
spring.codec.max-in-memory-size=2MB
# マルチパート（ファイルアップロード）の上限
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── Actuator エンドポイントの最小公開化（万一導入時の保険） ────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# MySQL connection settings
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/training_db?serverTimezone=Asia/Tokyo}
# デフォルト値なし: 未設定時は起動失敗させて root / 空パスワードでの本番接続を防ぐ
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# Doma2 configuration
doma.dialect=mysql

# Batch configuration
# 本番サーバーのパスは環境変数で注入する（ソースコードにパスをハードコードしない）
batch.master.update.file-path=${BATCH_FILE_PATH:/tmp/input/master_data.csv}
batch.master.update.allowed-directory=${BATCH_ALLOWED_DIR:/tmp/input/}
batch.master.update.cron=0 30 15 * * *
batch.master.tokenCleanup.cron=0 0 0 * * *
batch.master.retentionCleanup.cron=0 0 0 * * *

# ── データ保護期間 ────────────────────────────────────────────────────
# 論理削除後もこの年数を経過するまで物理削除を行わない（デフォルト 7 年）
app.retention.retention-years=7

# Mail settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=false

# OAuth2 settings
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile, email

# LINE Login settings
spring.security.oauth2.client.registration.line.client-id=${LINE_CLIENT_ID}
spring.security.oauth2.client.registration.line.client-secret=${LINE_CLIENT_SECRET}
spring.security.oauth2.client.registration.line.scope=profile, email, openid
spring.security.oauth2.client.registration.line.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.line.redirect-uri={baseUrl}/login/oauth2/code/line
spring.security.oauth2.client.provider.line.authorization-uri=https://access.line.me/oauth2/v2.1/authorize
spring.security.oauth2.client.provider.line.token-uri=https://api.line.me/oauth2/v2.1/token
spring.security.oauth2.client.provider.line.user-info-uri=https://api.line.me/v2/profile
spring.security.oauth2.client.provider.line.user-name-attribute=userId

# Logging configuration
logging.level.root=WARN
logging.level.com.example.traning=INFO
logging.level.org.springframework.web=INFO
# Spring Security のデバッグログは本番で認証情報・トークンを漏らす危険があるため INFO まで。
# 本番プロファイル（application-gcp.properties）でさらに WARN に絞り込み。
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
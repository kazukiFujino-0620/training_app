# GCP production profile properties

# ── アプリケーションベースURL（メール内リンクに使用） ────────────────
app.base-url=https://training-app-test.mydns.jp

# ── Swagger UI は本番では完全無効化する ────────────────────────────
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ── DB 接続（本番用 SSL 必須） ─────────────────────────────────────
# CloudSQL Unix ソケット経由の場合は sslMode 不要だが、TCP の場合は必須
SPRING_DATASOURCE_URL=jdbc:mysql://127.0.0.1:3306/training_db?serverTimezone=Asia/Tokyo&sslMode=REQUIRED&requireSSL=true

# ── Remember-me キー（本番では環境変数から注入） ────────────────────
# GCP Cloud Run の「変数とシークレット」で APP_SECURITY_REMEMBER_ME_KEY を設定してください
app.security.remember-me-key=${APP_SECURITY_REMEMBER_ME_KEY}

# ── セキュリティ強化 ─────────────────────────────────────────────
# 本番環境ではデバッグログを出力しない
logging.level.org.springframework=WARN
logging.level.com.example.traning=INFO

# ── Cookie セキュリティ（本番は HTTPS のみ） ────────────────────────
# 本番では必ず secure=true。HTTP 経由でセッション Cookie が漏出するのを防ぐ。
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# ── Spring Security デバッグログ抑制 ────────────────────────────────
# 認証情報・トークンが誤ってログに出力されないように本番では WARN 以上
logging.level.org.springframework.security=WARN

# ── DDL（スキーマ変更）は本番では絶対に validate のみ ───────────────
# JPA による自動 DDL は意図しないスキーマ変更で事故を招くため厳格に制限
spring.jpa.hibernate.ddl-auto=validate

# ── JWT シークレットキー（本番では環境変数から注入） ────────────────────
# GCP Cloud Run の「変数とシークレット」で APP_JWT_SECRET を設定してください
app.jwt.secret=${APP_JWT_SECRET}

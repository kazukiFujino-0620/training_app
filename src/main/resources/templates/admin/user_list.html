<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="theme=${session.theme ?: 'light'}" 
      th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー管理 - トレーニング管理システム</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    
    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-secondary">
    <!-- Header -->
    <header th:replace="~{common :: headerFragment}"></header>
    
    <!-- Main Content -->
    <main class="main-content">
        <div class="content-wrapper">
            <!-- Page Header -->
            <div class="mb-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold text-primary">ユーザー管理</h1>
                        <p class="text-muted mt-2">ユーザー権限・ステータス管理</p>
                    </div>
                </div>
            </div>
            
            <!-- Users Table -->
            <div class="card">
                <div class="card-header">
                    <h2 class="text-xl font-semibold">ユーザー一覧</h2>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>ユーザー名</th>
                                    <th>メールアドレス</th>
                                    <th>権限</th>
                                    <th>ステータス</th>
                                    <th>登録日</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${userList}">
                                    <td th:text="${user.userId}">1</td>
                                    <td th:text="${user.userName}">ユーザー名</td>
                                    <td th:text="${user.email}">email@example.com</td>
                                    <td>
                                        <span th:if="${user.role == 'ADMIN'}" 
                                              class="badge badge-danger">
                                            管理者
                                        </span>
                                        <span th:if="${user.role == 'USER'}" 
                                              class="badge badge-primary">
                                            一般
                                        </span>
                                    </td>
                                    <td>
                                        <span th:if="${user.enabled == true}" 
                                              class="badge badge-success">
                                            有効
                                        </span>
                                        <span th:if="${user.enabled == false}" 
                                              class="badge badge-secondary">
                                            無効
                                        </span>
                                    </td>
                                    <td th:text="${#temporals.format(user.createDatetime, 'yyyy/MM/dd')}">2024/01/01</td>
                                    <td>
                                        <a th:href="@{/admin/user/edit/{id}(id=${user.userId})}" 
                                           class="btn btn-secondary btn-sm">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline mr-1">
                                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                            </svg>
                                            編集
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <!-- Back Button -->
            <div class="mt-6">
                <a th:href="@{/menu}" class="btn btn-outline">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline mr-2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    メニューに戻る
                </a>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer th:replace="~{common :: footerFragment}"></footer>
    
    <!-- JavaScript -->
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/admin-user-list.js}"></script>
</body>
</html>

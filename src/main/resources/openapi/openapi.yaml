openapi: "3.0.3"
info:
  title: SmartTrainer API
  description: |
    Spring Boot 製トレーニング管理アプリケーションの API 仕様書。
    認証は Spring Security によるセッションベースのフォームログインおよび
    OAuth2（Google / LINE）に対応。
    管理者専用エンドポイントは ADMIN ロールが必要。
  version: "1.0.0"

servers:
  - url: http://localhost:8080
    description: ローカル開発環境

tags:
  - name: auth
    description: 認証・ユーザー登録
  - name: account
    description: アカウント管理（論理削除からの復元）
  - name: password
    description: パスワードリセット
  - name: profile
    description: ユーザープロフィール管理
  - name: training
    description: トレーニング管理（CRUD + リスト取得）
  - name: master
    description: マスターデータ取得
  - name: personal-record
    description: 自己記録（PR）管理
  - name: goal
    description: トレーニング目標設定・達成率管理
  - name: mfa
    description: 2要素認証（TOTP）設定・認証フロー（メール+パスワードログインユーザーのみ対象）
  - name: session
    description: セッション管理（タイムアウト監視・セッション延長）
  - name: template
    description: トレーニングテンプレート管理（CRUD + 適用）
  - name: admin
    description: 管理者専用操作

# ──────────────────────────────────────────────────────────────────
# Paths
# ──────────────────────────────────────────────────────────────────
paths:

  # ── ルート ──────────────────────────────────────────────────────
  /:
    get:
      tags: [auth]
      summary: ルートリダイレクト
      description: ルートへのアクセスを /login へリダイレクトする。
      responses:
        "302":
          description: /login へリダイレクト

  # ── 認証 ────────────────────────────────────────────────────────
  /login:
    get:
      tags: [auth]
      summary: ログイン画面表示
      description: Spring Security が提供するフォームログイン画面を返す。
      responses:
        "200":
          description: ログイン画面 HTML
    post:
      tags: [auth]
      summary: ログイン認証
      description: |
        Spring Security のフォームログイン処理。
        成功時は /menu へリダイレクト、失敗時は /login?error へリダイレクト。

        **レート制限（RateLimitFilter）**: IP 単位で 10回/分。超過で 429。

        **IPブロック（IpBlockService）**: 同一IPからのログイン失敗が 20回 に達すると
        30分間ブロック。ブロック中は認証処理を実行せず即座に 429 を返す。
        レート制限とは独立して動作する。

        **2FA（TOTP）**: メール+パスワードログインユーザーが 2FA 有効の場合、
        認証成功後に SecurityContext をクリアしセッションに MFA_PENDING フラグをセット、
        /auth/mfa へリダイレクト。Google / LINE OAuth2 ユーザーは対象外。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: ユーザー名
                password:
                  type: string
                  format: password
                  description: パスワード
                remember-me:
                  type: string
                  description: リメンバーミー（"on" を指定）
              required:
                - username
                - password
      responses:
        "302":
          description: 認証成功 → /menu へリダイレクト、または失敗 → /login?error へリダイレクト
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  /signup:
    get:
      tags: [auth]
      summary: 新規登録画面表示
      responses:
        "200":
          description: 新規登録フォーム HTML
    post:
      tags: [auth]
      summary: ユーザー新規登録
      description: フォームデータを受け取りユーザーを登録する。バリデーションエラー時はフォームを再表示。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "./schemas/requests/SignupRequest.yaml"
      responses:
        "302":
          description: 登録成功 → /login へリダイレクト
        "200":
          description: バリデーションエラー → フォーム再表示
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  # ── アカウント復元 ──────────────────────────────────────────────
  /account/restore/sent:
    get:
      tags: [account]
      summary: アカウント復元メール送信完了画面
      description: |
        論理削除されたアカウントの復元メール送信後の案内ページ。
        /signup で同一メールアドレスのアカウントが論理削除済みの場合にリダイレクトされる。
      responses:
        "200":
          description: 復元メール送信完了案内 HTML

  /account/restore:
    get:
      tags: [account]
      summary: アカウント復元確認画面
      description: メールで送付されたトークンを受け取り、復元確認ページを表示する。
      parameters:
        - name: token
          in: query
          required: true
          description: メールで送付されたアカウント復元トークン
          schema:
            type: string
      responses:
        "200":
          description: アカウント復元確認フォーム HTML

  /account/restore/confirm:
    post:
      tags: [account]
      summary: アカウント復元実行
      description: |
        トークンを検証してアカウントを復元（論理削除フラグを解除）する。
        成功時は /login?restoreSuccess へリダイレクト。
        トークンが無効または期限切れの場合はフォームにエラーを表示。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: アカウント復元トークン
      responses:
        "302":
          description: 復元成功 → /login?restoreSuccess へリダイレクト
        "200":
          description: トークン無効または期限切れ → エラーメッセージ付きフォーム再表示

  # ── パスワードリセット ────────────────────────────────────────────
  /password/forget:
    get:
      tags: [password]
      summary: パスワードリセット申請画面
      responses:
        "200":
          description: メールアドレス入力フォーム HTML
    post:
      tags: [password]
      summary: パスワードリセットメール送信
      description: 入力されたメールアドレスへリセット用トークンを送信する。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "./schemas/requests/PasswordForgetRequest.yaml"
      responses:
        "302":
          description: 送信完了 → /password/sent へリダイレクト
        "200":
          description: バリデーションエラーまたは送信失敗 → フォーム再表示

  /password/sent:
    get:
      tags: [password]
      summary: パスワードリセットメール送信完了画面
      responses:
        "200":
          description: 送信完了画面 HTML

  /password/reset:
    get:
      tags: [password]
      summary: 新パスワード入力画面
      parameters:
        - name: token
          in: query
          required: true
          description: メールで送付されたリセットトークン
          schema:
            type: string
      responses:
        "200":
          description: 新パスワード入力フォーム HTML
        "302":
          description: トークン無効または期限切れ → /password/forget へリダイレクト
    post:
      tags: [password]
      summary: パスワード更新
      description: トークンを検証し、パスワードを更新する。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "./schemas/requests/PasswordResetRequest.yaml"
      responses:
        "302":
          description: 更新成功 → /login?resetSuccess へリダイレクト
        "200":
          description: パスワード不一致またはトークン無効 → フォーム再表示

  # ── プロフィール ────────────────────────────────────────────────
  /user/profile:
    get:
      tags: [profile]
      summary: プロフィール画面表示
      description: ログインユーザーのプロフィール情報をフォームに表示する。認証必須。
      responses:
        "200":
          description: プロフィール編集フォーム HTML
        "302":
          description: 未認証 → ログインページへリダイレクト
    post:
      tags: [profile]
      summary: プロフィール更新
      description: |
        ユーザー名・身長・体重・性別・生年月日を更新する。認証必須。
        バリデーションエラー時はフォームを再表示。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "./schemas/requests/ProfileUpdateRequest.yaml"
      responses:
        "302":
          description: 更新成功 → /user/profile へリダイレクト、または未認証 → /login へリダイレクト
        "200":
          description: バリデーションエラー → フォーム再表示

  # ── メニュー（カレンダー） ──────────────────────────────────────
  /menu:
    get:
      tags: [training]
      summary: メニュー画面（カレンダー表示）
      description: ログインユーザーのトレーニングカレンダーを表示する。認証必須。
      parameters:
        - name: date
          in: query
          required: false
          description: 表示する月の日付（省略時は今日）
          schema:
            type: string
            format: date
            example: "2026-05-01"
      responses:
        "200":
          description: カレンダー付きメニュー画面 HTML
        "302":
          description: 未認証 → ログインページへリダイレクト

  /menu/save:
    post:
      tags: [training]
      summary: トレーニング保存（フォーム）
      description: フォームからトレーニングを登録・更新する。認証必須。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "./schemas/requests/TrainingFormRequest.yaml"
      responses:
        "302":
          description: 保存完了 → /menu?date={trainingDate} へリダイレクト

  /menu/delete:
    post:
      tags: [training]
      summary: トレーニング削除（フォーム）
      description: 指定 ID のトレーニングを削除する。所有者チェックあり。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "./schemas/requests/TrainingDeleteRequest.yaml"
      responses:
        "302":
          description: 削除完了またはアクセス拒否 → /menu へリダイレクト

  /start/training:
    get:
      tags: [training]
      summary: トレーニング実施画面
      description: 指定日のトレーニング一覧とタイマー情報を含む実施画面を返す。
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2026-05-26"
      responses:
        "200":
          description: トレーニング実施画面 HTML

  /training/register:
    get:
      tags: [training]
      summary: トレーニング登録画面
      description: 新規トレーニング登録フォームを表示する。
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-05-26"
      responses:
        "200":
          description: トレーニング登録フォーム HTML

  /detail:
    get:
      tags: [training]
      summary: トレーニング詳細画面
      description: |
        指定日のトレーニング詳細（セット情報・総ボリューム・消費カロリー推定）を表示する。
        認証必須。
      parameters:
        - name: date
          in: query
          required: false
          description: 表示対象日（省略時は今日）
          schema:
            type: string
            format: date
            example: "2026-05-31"
      responses:
        "200":
          description: トレーニング詳細画面 HTML（総ボリューム・消費カロリー・種目リスト含む）
        "302":
          description: 未認証 → ログインページへリダイレクト

  # ── マスターデータ API ──────────────────────────────────────────
  /api/training-parts:
    get:
      tags: [master]
      summary: 部位マスター一覧取得
      description: training_part_master の全件を返す。
      responses:
        "200":
          $ref: "./schemas/responses/MasterListResponse.yaml"
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  /api/training-items:
    get:
      tags: [master]
      summary: 部位別種目マスター一覧取得
      parameters:
        - name: partCode
          in: query
          required: true
          description: 部位コード
          schema:
            $ref: "./schemas/enums/PartCode.yaml"
      responses:
        "200":
          $ref: "./schemas/responses/ItemMasterListResponse.yaml"
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  /api/training-items-grouped:
    get:
      tags: [master]
      summary: 全部位の種目マスターをグループ別に取得
      description: 部位コードをキー、種目リストを値とするオブジェクトを返す。
      responses:
        "200":
          $ref: "./schemas/responses/ItemMasterGroupedResponse.yaml"
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  # ── トレーニング REST API（CRUD + リスト取得） ───────────────────
  /api/training/{id}:
    get:
      tags: [training]
      summary: トレーニング取得（Read）
      description: 指定 ID のトレーニングを返す。所有者チェックあり。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          $ref: "./schemas/responses/TrainingResponse.yaml"
        "403":
          description: 他ユーザーのデータへのアクセス
        "404":
          description: 指定 ID が存在しない
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  /api/training/save:
    post:
      tags: [training]
      summary: トレーニング新規登録（Create）
      description: |
        トレーニングを新規登録する。
        ログインユーザーの ID が自動付与される。登録成功時はトレーニング ID を返す。
        details[].setType に WARMUP/MAIN/DROP を指定可能。省略時はサーバー側で MAIN として扱う。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/requests/TrainingRequest.yaml"
      responses:
        "200":
          description: 登録されたトレーニング ID
          content:
            application/json:
              schema:
                type: integer
                format: int64
                example: 42
        "400":
          description: バリデーションエラー
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  /api/training/update/{id}:
    post:
      tags: [training]
      summary: トレーニング更新（Update）
      description: |
        指定 ID のトレーニングを更新する。所有者チェックあり。
        trainingDate・partCode・userId はサーバー側で保持する。
        details[].setType に WARMUP/MAIN/DROP を指定可能。省略時はサーバー側で MAIN として扱う。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/requests/TrainingRequest.yaml"
      responses:
        "200":
          description: 更新成功
        "403":
          description: 他ユーザーのデータへのアクセス
        "404":
          description: 指定 ID が存在しない
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  /api/training/delete/{id}:
    post:
      tags: [training]
      summary: トレーニング削除（Delete）
      description: 指定 ID のトレーニングを削除する。所有者チェックあり。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 削除成功
        "403":
          description: 他ユーザーのデータへのアクセス
        "404":
          description: 指定 ID が存在しない
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  /api/training/register-bulk:
    post:
      tags: [training]
      summary: トレーニング一括登録・更新（Bulk Create/Update）
      description: |
        日付と複数のトレーニングデータをまとめて登録・更新する。
        id が指定されている場合は既存データを更新、null の場合は新規登録する。
        details[].setType に WARMUP/MAIN/DROP を指定可能。省略時はサーバー側で MAIN として扱う。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/requests/BulkRegisterRequest.yaml"
      responses:
        "200":
          description: 保存成功
          content:
            application/json:
              schema:
                type: string
                example: 保存に成功しました
        "500":
          description: 登録失敗
          content:
            application/json:
              schema:
                type: string
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  /api/training/finish:
    post:
      tags: [training]
      summary: トレーニング一括完了保存
      description: |
        トレーニングリストを一括保存し完了状態にする。所有者チェックあり。
        セットデータが空の場合は 400 を返す。
        details[].setType に WARMUP/MAIN/DROP を指定可能。省略時はサーバー側で MAIN として扱う。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "./schemas/requests/TrainingRequest.yaml"
      responses:
        "200":
          description: 保存成功
          content:
            application/json:
              schema:
                type: string
                example: 保存に成功しました
        "400":
          description: セットデータ未入力または不正なトレーニング ID
        "403":
          description: 他ユーザーのトレーニングへのアクセス
        "404":
          description: 指定したトレーニングが存在しない
        "500":
          description: 内部エラー
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  # ── 成長グラフ API ──────────────────────────────────────────────
  /api/growth-chart:
    get:
      tags: [training]
      summary: 種目別成長グラフデータ取得
      description: |
        指定種目・期間の週次集計データ（最高重量・ボリューム）を返す。
        userId はサーバーサイドで解決（IDOR防止）。認証必須。
      parameters:
        - name: itemName
          in: query
          required: true
          description: 種目名
          schema:
            type: string
            maxLength: 50
            example: ベンチプレス
        - name: period
          in: query
          required: false
          description: 集計期間（省略時は3m）
          schema:
            type: string
            enum: [1m, 3m, 6m, 1y]
            default: 3m
      responses:
        "200":
          $ref: "./schemas/responses/GrowthChartResponse.yaml"
        "400":
          description: itemName が空・50文字超、または period が不正値
        "302":
          description: 未認証 → ログインページへリダイレクト
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  # ── 前回記録 ─────────────────────────────────────────────────────
  /api/previous-training:
    get:
      tags: [training]
      summary: 種目別前回記録取得
      description: |
        指定種目の直近最大7セッション分のセット詳細と自己記録（PR）を返す。
        今日のデータは除外され、今日以前の最新セッションが先頭（index 0）になる。
        セッションナビゲーション（< / >）はフロントエンド側で完結する設計のため、
        このエンドポイントは画面表示時に1回だけ呼ばれる。
        userId はサーバーサイドで解決（IDOR防止）。認証必須。
        レスポンスの sets[].setType にセット種別が含まれる。過去データ（set_type追加以前）の場合は null。
      parameters:
        - name: itemName
          in: query
          required: true
          description: 種目名（training_item_master に存在する値のみ有効）
          schema:
            type: string
            maxLength: 50
            example: ベンチプレス
      responses:
        "200":
          $ref: "./schemas/responses/PreviousTrainingResponse.yaml"
        "400":
          description: itemName が空・null または 50文字超
          content:
            application/json:
              schema:
                $ref: "./schemas/models/ErrorResponse.yaml"
              example:
                error: "種目名は必須です"
        "302":
          description: 未認証 → ログインページへリダイレクト
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  # ── 自己記録（PR） ───────────────────────────────────────────────
  /pr:
    get:
      tags: [personal-record]
      summary: 自己記録（PR）一覧画面
      description: |
        ログインユーザーの全種目PRを一覧表示する。認証必須。
        GoalService 実装後は各 PR に対応する ACTIVE 目標（goalMap）と
        PR 未記録の ACTIVE 目標（goalsWithoutPr）も表示される。
      responses:
        "200":
          description: PR一覧画面 HTML（目標達成率付き）
        "302":
          description: 未認証 → ログインページへリダイレクト

  /api/pr:
    get:
      tags: [personal-record]
      summary: 自己記録（PR）一覧取得 API
      description: |
        ログインユーザーの全種目PRをJSON配列で返す。
        userId はサーバーサイドで解決（IDOR防止）。認証必須。
      responses:
        "200":
          $ref: "./schemas/responses/PersonalRecordListResponse.yaml"
        "302":
          description: 未認証 → ログインページへリダイレクト
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  # ── 目標設定 ────────────────────────────────────────────────────
  /user/goals:
    get:
      tags: [goal]
      summary: 目標一覧画面
      description: ログインユーザーの全目標を一覧表示する。認証必須。
      responses:
        "200":
          description: 目標一覧画面 HTML
        "302":
          description: 未認証 → ログインページへリダイレクト
    post:
      tags: [goal]
      summary: 目標登録
      description: |
        フォームから目標を新規登録する。認証必須。
        targetWeight と targetReps のどちらか一方は必須。
        バリデーションエラー時はフォームを再表示。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "./schemas/requests/GoalCreateRequest.yaml"
      responses:
        "302":
          description: 登録成功 → /user/goals へリダイレクト
        "200":
          description: バリデーションエラー → フォーム再表示

  /user/goals/{id}/achieve:
    post:
      tags: [goal]
      summary: 目標を達成済みにマーク
      description: |
        指定目標のステータスを ACHIEVED に変更する。認証必須、所有者チェックあり。
        AJAX 呼び出しを想定（JSON レスポンス）。
      parameters:
        - name: id
          in: path
          required: true
          description: 目標 ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 達成マーク成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ACHIEVED
        "403":
          description: 他ユーザーの目標へのアクセス
        "404":
          description: 指定目標が存在しない
        "302":
          description: 未認証 → ログインページへリダイレクト

  /user/goals/{id}:
    delete:
      tags: [goal]
      summary: 目標削除
      description: |
        指定目標を削除する。認証必須、所有者チェックあり。
        AJAX 呼び出しを想定（JSON レスポンス）。
      parameters:
        - name: id
          in: path
          required: true
          description: 目標 ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 削除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: deleted
        "403":
          description: 他ユーザーの目標へのアクセス
        "404":
          description: 指定目標が存在しない
        "302":
          description: 未認証 → ログインページへリダイレクト

  /api/goals:
    get:
      tags: [goal]
      summary: 目標一覧取得 API（達成率付き）
      description: |
        ログインユーザーの全目標を達成率情報とともに JSON で返す。
        effectiveStatus は期日を考慮した実効ステータス（期日切れの ACTIVE は EXPIRED として返す）。
        認証必須。
      responses:
        "200":
          $ref: "./schemas/responses/GoalListResponse.yaml"
        "302":
          description: 未認証 → ログインページへリダイレクト
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  # ── 2要素認証（MFA）────────────────────────────────────────────
  /user/mfa:
    get:
      tags: [mfa]
      summary: 2FA 設定画面表示
      description: |
        ログインユーザーの 2FA 有効/無効状態を表示する設定画面。認証必須。
        OAuth2（Google/LINE）ユーザーはこの画面にアクセスできない。
      responses:
        "200":
          description: 2FA 設定画面 HTML（有効/無効状態、バックアップコード再生成ボタン）
        "302":
          description: 未認証 → ログインページへリダイレクト / OAuth2ユーザー → /menu へリダイレクト

  /user/mfa/setup:
    get:
      tags: [mfa]
      summary: 2FA セットアップ画面（QR コード表示）
      description: |
        TOTP の秘密鍵を生成し、QR コードをセッションに一時保存して表示する。認証必須。
        この時点ではまだ DB に保存しない（OTP 確認後に有効化）。
      responses:
        "200":
          description: QR コード・手動入力キー・OTP 確認フォームを含む HTML
        "302":
          description: 未認証 → ログインページへリダイレクト

  /user/mfa/enable:
    post:
      tags: [mfa]
      summary: 2FA 有効化
      description: |
        セッションに保存した秘密鍵と入力された OTP を照合し、一致したら 2FA を有効化する。
        有効化成功時はバックアップコード（10件）を生成して表示する（1回のみ）。
        認証必須。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "./schemas/requests/MfaEnableRequest.yaml"
      responses:
        "200":
          description: 有効化成功 → バックアップコード表示画面
        "200 (error)":
          description: OTP 不一致 → エラーメッセージ付きセットアップ画面再表示
        "302":
          description: 未認証 → ログインページへリダイレクト

  /user/mfa/disable:
    post:
      tags: [mfa]
      summary: 2FA 無効化
      description: |
        現在のパスワードを再確認したうえで 2FA を無効化する。
        バックアップコードも合わせて全削除する。認証必須。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "./schemas/requests/MfaDisableRequest.yaml"
      responses:
        "302":
          description: 無効化成功 → /user/mfa へリダイレクト
        "200":
          description: パスワード不一致 → エラーメッセージ付き設定画面再表示
        "302 (unauth)":
          description: 未認証 → ログインページへリダイレクト

  /user/mfa/backup-codes/regenerate:
    post:
      tags: [mfa]
      summary: バックアップコード再生成
      description: |
        既存のバックアップコードを全削除し、新しい 10 件を生成して表示する。
        再生成後は旧コードは無効になる。認証必須。
      responses:
        "200":
          description: 新しいバックアップコード 10 件を表示する HTML
        "302":
          description: 未認証 → ログインページへリダイレクト / 2FA 未有効 → /user/mfa へリダイレクト

  /auth/mfa:
    get:
      tags: [mfa]
      summary: OTP 入力画面（ログイン認証フロー中）
      description: |
        フォームログイン成功後、2FA 有効ユーザーにリダイレクトされる OTP 入力画面。
        セッションに MFA_PENDING_USER_ID が存在しない場合は /login へリダイレクト。
      responses:
        "200":
          description: OTP 入力フォーム HTML（バックアップコード入力欄も含む）
        "302":
          description: MFA_PENDING セッションなし → /login へリダイレクト

  /auth/mfa/verify:
    post:
      tags: [mfa]
      summary: OTP / バックアップコード検証 → 認証完了
      description: |
        セッションの MFA_PENDING_USER_ID を使い TOTP または バックアップコードを検証する。
        成功時: セッションに保存していた Authentication を SecurityContextHolder に設定し /menu へリダイレクト。
        失敗時: エラーメッセージ付きで OTP 入力画面を再表示。
        5 回失敗で既存の LoginAttemptService によりアカウントロック対象。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "./schemas/requests/MfaVerifyRequest.yaml"
      responses:
        "302":
          description: 検証成功 → /menu へリダイレクト
        "200":
          description: OTP / バックアップコード不一致 → エラーメッセージ付き再表示
        "302 (expired)":
          description: セッション期限切れ → /login へリダイレクト
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  # ── トレーニングテンプレート ────────────────────────────────────────────
  /training/template:
    get:
      tags: [template]
      summary: テンプレート管理画面
      description: |
        ログインユーザーのテンプレート一覧を表示する管理画面。認証必須。
        Controller・Templateファイルが実装完了してからナビリンクを追加すること。
      responses:
        "200":
          description: テンプレート管理画面 HTML
        "302":
          description: 未認証 → ログインページへリダイレクト

  /api/templates:
    get:
      tags: [template]
      summary: テンプレート一覧取得
      description: |
        ログインユーザーのテンプレート一覧を返す。明細（items）も含む。
        userId はサーバーサイドで解決（IDOR防止）。認証必須。
      responses:
        "200":
          $ref: "./schemas/responses/TemplateListResponse.yaml"
        "302":
          description: 未認証 → ログインページへリダイレクト
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"
    post:
      tags: [template]
      summary: テンプレート新規作成
      description: |
        テンプレートを新規作成する。作成したテンプレートのIDを返す。
        userId はログインユーザーのIDが自動付与される。認証必須。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/requests/TemplateCreateRequest.yaml"
      responses:
        "200":
          description: 作成されたテンプレートID
          content:
            application/json:
              schema:
                type: integer
                format: int64
                example: 1
        "400":
          description: バリデーションエラー
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  /api/templates/{id}:
    put:
      tags: [template]
      summary: テンプレート更新
      description: |
        指定IDのテンプレートを更新する。所有者チェックあり（他ユーザーのテンプレートは変更不可）。
        明細は全件削除→再INSERT（差分更新ではない）。認証必須。
      parameters:
        - name: id
          in: path
          required: true
          description: テンプレートID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/requests/TemplateCreateRequest.yaml"
      responses:
        "200":
          description: 更新成功
        "403":
          description: 他ユーザーのテンプレートへのアクセス
        "404":
          description: 指定テンプレートが存在しない
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"
    delete:
      tags: [template]
      summary: テンプレート削除（論理削除）
      description: |
        指定IDのテンプレートを論理削除する（deleted_at をセット）。
        所有者チェックあり。認証必須。
      parameters:
        - name: id
          in: path
          required: true
          description: テンプレートID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 削除成功
        "403":
          description: 他ユーザーのテンプレートへのアクセス
        "404":
          description: 指定テンプレートが存在しない
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  /api/templates/{id}/apply:
    post:
      tags: [template]
      summary: テンプレート適用（トレーニング一括生成）
      description: |
        指定テンプレートを当日のトレーニングとして展開する。
        種目ごとに Training + TrainingDetail を INSERT する。

        **前回実績の優先**: weight/reps は「前回実績値 > テンプレートデフォルト」の優先順位で設定。
        前回実績が存在しない場合はテンプレートの値（null なら 0）を使用する。

        **set_type**: 常にテンプレート定義から引き継ぐ（前回値で上書きしない）。

        **重複種目**: 当日すでに同一種目が存在しても重複登録を許可する。
        レスポンスの duplicateItems に重複種目名を含めるので、フロント側でトースト警告を表示すること。

        所有者チェックあり。認証必須。
      parameters:
        - name: id
          in: path
          required: true
          description: テンプレートID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date]
              properties:
                date:
                  type: string
                  format: date
                  description: 適用対象日
                  example: "2026-06-01"
      responses:
        "200":
          $ref: "./schemas/responses/TemplateApplyResponse.yaml"
        "403":
          description: 他ユーザーのテンプレートへのアクセス
        "404":
          description: 指定テンプレートが存在しない
        "500":
          description: 内部エラー
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  # ── セッション管理 ──────────────────────────────────────────────
  /api/session/ping:
    get:
      tags: [session]
      summary: セッション生存確認・延長
      description: |
        JavaScript から定期的に呼び出されるセッション維持エンドポイント。
        リクエストが到達するだけで Spring がセッションの有効期限を自動リセットする。

        **認証必須**: 未認証の場合は 302 リダイレクトではなく 401 を返す
        （`X-Requested-With: XMLHttpRequest` ヘッダーを付与すること）。

        **CSRF**: GET かつ副作用なし（セッション延長は Spring の自動動作）のため CSRF トークン不要。

        **ping 間隔**:
        - トレーニング実施画面 (`/start/training`): 3分ごと
        - その他の画面: 10分ごと
      parameters:
        - name: X-Requested-With
          in: header
          required: true
          description: AJAX リクエストであることを示すヘッダー。401 返却の条件。
          schema:
            type: string
            enum: [XMLHttpRequest]
      responses:
        "200":
          $ref: "./schemas/responses/SessionPingResponse.yaml"
        "401":
          description: 未認証（セッション切れ）。ブラウザリダイレクトなしで直接返される。
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  # ── 管理者画面（HTML） ──────────────────────────────────────────
  /admin/users:
    get:
      tags: [admin]
      summary: ユーザー一覧取得・画面表示（List）
      description: 全ユーザーの一覧を表示する。ADMIN ロール必須。
      security:
        - sessionAuth: []
      responses:
        "200":
          description: ユーザー一覧 HTML
        "403":
          description: 権限なし

  /admin/user/edit/{id}:
    get:
      tags: [admin]
      summary: ユーザー編集画面（Read）
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ユーザー編集フォーム HTML
        "404":
          description: 指定ユーザーが存在しない

  /admin/user/update:
    post:
      tags: [admin]
      summary: ユーザー情報更新（Update）
      description: ユーザー情報を更新する（パスワードは変更しない）。ADMIN ロール必須。
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "./schemas/requests/UserUpdateRequest.yaml"
      responses:
        "302":
          description: 更新完了 → /admin/users へリダイレクト
        "403":
          description: 権限なし

  /admin/all-users-training:
    get:
      tags: [admin]
      summary: 全ユーザーのトレーニング一覧取得・画面表示（List）
      security:
        - sessionAuth: []
      parameters:
        - name: userName
          in: query
          required: false
          description: ユーザー名で絞り込み（部分一致）
          schema:
            type: string
      responses:
        "200":
          description: ユーザー一覧 HTML（トレーニング状況付き）

  /admin/user/training-detail/{id}:
    get:
      tags: [admin]
      summary: ユーザーのトレーニング詳細・カレンダー表示（Read）
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ユーザー ID
          schema:
            type: integer
        - name: date
          in: query
          required: false
          description: 表示対象月（省略時は今月）
          schema:
            type: string
            format: date
            example: "2026-05-01"
      responses:
        "200":
          description: ユーザートレーニング詳細 HTML
        "404":
          description: 指定ユーザーが存在しない

  /admin/user/{id}/goals:
    get:
      tags: [admin, goal]
      summary: ユーザーの目標一覧確認（管理者用）
      description: 指定ユーザーの全目標を達成率情報とともに表示する。ADMIN ロール必須。
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ユーザー ID
          schema:
            type: integer
      responses:
        "200":
          description: ユーザー目標一覧 HTML
        "404":
          description: 指定ユーザーが存在しない
        "403":
          description: 権限なし

  /admin/user/{id}/mfa/reset:
    post:
      tags: [admin, mfa]
      summary: ユーザーの 2FA リセット（管理者専用）
      description: |
        指定ユーザーの 2FA 設定（秘密鍵・バックアップコード）を削除し、無効状態に戻す。
        会員がデバイスを紛失してログインできなくなった場合の緊急対応用。
        ADMIN ロール必須。AJAX 呼び出しを想定（JSON レスポンス）。
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: リセット対象のユーザー ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: リセット成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: reset
        "403":
          description: 権限なし
        "404":
          description: 指定ユーザーが存在しない

  # ── 管理者 REST API ─────────────────────────────────────────────
  /admin/training-details:
    get:
      tags: [admin]
      summary: 指定ユーザー・日付のトレーニングリスト取得（List）
      description: 指定ユーザーと日付に紐づくトレーニングリスト（セット詳細含む）を JSON で返す。
      security:
        - sessionAuth: []
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          description: 取得対象日（ISO 8601 形式）
          schema:
            type: string
            format: date
            example: "2026-05-26"
      responses:
        "200":
          $ref: "./schemas/responses/TrainingListResponse.yaml"
        "500":
          description: 内部エラー

  /admin/chart-data:
    get:
      tags: [admin]
      summary: ユーザーの部位別ボリュームグラフデータ取得（List）
      description: |
        指定ユーザーの部位別トレーニングボリューム（重量 × 回数）を日次集計して返す。
        startDate / endDate 省略時は過去 30 日間が対象になる。
      security:
        - sessionAuth: []
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-04-26"
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-05-26"
      responses:
        "200":
          $ref: "./schemas/responses/ChartDataResponse.yaml"
        "500":
          description: 内部エラー

  /admin/api/training-details:
    get:
      tags: [admin]
      summary: トレーニングセット詳細一覧取得（List）
      description: |
        指定日付の TrainingDetail リストを返す。
        userId 省略時は全ユーザーの指定日データを返す。
        @PreAuthorize("hasRole('ADMIN')") により ADMIN ロール必須。
      security:
        - sessionAuth: []
      parameters:
        - name: date
          in: query
          required: true
          description: 取得対象日（YYYY-MM-DD 形式）
          schema:
            type: string
            example: "2026-05-26"
        - name: userId
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        "200":
          $ref: "./schemas/responses/TrainingDetailListResponse.yaml"
        "403":
          description: 権限なし
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

  /admin/api/training-volume/{userId}:
    get:
      tags: [admin]
      summary: ユーザーの期間別ボリュームデータ取得（List）
      description: |
        指定ユーザーの期間別トレーニングボリュームを返す。
        @PreAuthorize("hasRole('ADMIN')") により ADMIN ロール必須。
        IDOR を URL レベル＋メソッドレベルで防止。
      security:
        - sessionAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2026-04-26"
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2026-05-26"
      responses:
        "200":
          description: ボリュームデータ（Map<String, Object> 形式）
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: 権限なし
        "429":
          $ref: "./schemas/responses/TooManyRequestsResponse.yaml"

# ──────────────────────────────────────────────────────────────────
# Components（セキュリティスキームのみ。スキーマは schemas/ を参照）
# ──────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID
      description: |
        Spring Security のセッション認証。
        ログイン後に JSESSIONID クッキーが付与される。

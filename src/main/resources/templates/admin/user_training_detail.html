<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="theme=${session.theme ?: 'light'}" 
      th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トレーニング詳細 - トレーニング管理システム</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    
    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-secondary" th:data-user-id="${userId}">
    <!-- Header -->
    <header th:replace="~{common :: headerFragment}"></header>
    
    <!-- Main Content -->
    <main class="main-content">
        <div class="content-wrapper">
            <!-- Page Header -->
            <div class="mb-6">
                <div class="flex items-center gap-4">
                    <a th:href="@{/admin/all-users-training}" class="btn btn-outline">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline mr-2">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                        一覧に戻る
                    </a>
                    <div>
                        <h1 class="text-3xl font-bold text-primary" th:text="${user.userName} + 'さんのトレーニング詳細'">ユーザーのトレーニング詳細</h1>
                        <p class="text-muted mt-2">トレーニング履歴と進捗管理</p>
                    </div>
                </div>
            </div>
            
            <!-- Calendar and Details Section -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Calendar Section -->
                <div class="card">
                    <div class="card-header">
                        <div class="flex items-center justify-between">
                            <h2 class="text-xl font-semibold">トレーニングカレンダー</h2>
                            <div class="flex items-center gap-4">
                                <a th:href="@{/admin/user/training-detail/{id}(id=${userId}, date=${prevMonth})}" class="btn btn-sm btn-outline">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline mr-1">
                                        <polyline points="15 18 9 12 15 6"/>
                                    </svg>
                                    前月
                                </a>
                                <span class="text-lg font-medium" th:text="${targetMonth.year} + '年' + ${targetMonth.monthValue} + '月'">2026年5月</span>
                                <a th:href="@{/admin/user/training-detail/{id}(id=${userId}, date=${nextMonth})}" class="btn btn-sm btn-outline">
                                    次月
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline ml-1">
                                        <polyline points="9 18 15 12 9 6"/>
                                    </svg>
                                </a>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="calendar-container">
                            <table class="table table-fixed">
                                <thead>
                                    <tr>
                                        <th class="text-danger">日</th>
                                        <th>月</th>
                                        <th>火</th>
                                        <th>水</th>
                                        <th>木</th>
                                        <th class="text-primary">金</th>
                                        <th class="text-primary">土</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="i : ${#numbers.sequence(0, 5)}">
                                        <td th:each="j : ${#numbers.sequence(0, 6)}" 
                                            th:with="index=${i * 7 + j}, day=${dateList[index]}, dayStatus=${status[index]}"
                                            class="calendar-cell cursor-pointer hover:bg-tertiary transition-colors"
                                            th:classappend="${day == today} ? 'bg-primary bg-opacity-20 font-bold' : ''"
                                            th:onclick="loadTrainingDetails([[${#temporals.format(day, 'yyyy-MM-dd')}]])">
                                            
                                            <div class="text-center p-2">
                                                <span th:text="${day.dayOfMonth}" 
                                                      th:class="${day.month != targetMonth.month} ? 'text-muted' : ''">1</span>
                                                
                                                <div class="mt-1">
                                                    <div th:if="${dayStatus == 'COMPLETED'}" class="text-success text-xs">✅</div>
                                                    <div th:if="${dayStatus == 'IN_PROGRESS'}" class="text-warning text-xs">🔥</div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
                <!-- Details Section -->
                <div class="card">
                    <div class="card-header">
                        <h2 class="text-xl font-semibold">トレーニング詳細</h2>
                        <p class="text-sm text-muted">選択した日のトレーニング内容</p>
                    </div>
                    <div class="card-body">
                        <div id="training-details">
                            <!-- トレーニング詳細がここに表示される -->
                            <div class="text-center py-8 text-muted">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mx-auto mb-4">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                    <line x1="16" y1="2" x2="16" y2="6"/>
                                    <line x1="8" y1="2" x2="8" y2="6"/>
                                    <line x1="3" y1="10" x2="21" y2="10"/>
                                </svg>
                                <p class="text-lg">カレンダーから日付を選択してください</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Weight Progression Chart -->
            <div class="card mt-6">
                <div class="card-header">
                    <div class="flex items-center justify-between">
                        <div>
                            <h2 class="text-xl font-semibold">各部位の総重量推移</h2>
                            <p class="text-sm text-muted">トレーニング量の推移グラフ</p>
                        </div>
                        <button type="button" onclick="toggleDateSearch()" class="btn btn-outline btn-sm">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline mr-2">
                                <polygon points="22 3 2 3 10 12.46 10 19 14 21 18 12.46 22 3"/>
                            </svg>
                            日付範囲検索
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <!-- Date Search Form -->
                    <div id="dateSearchForm" class="hidden mb-4 p-4 bg-tertiary rounded-lg">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label for="startDate" class="form-label">開始日</label>
                                <input type="date" id="startDate" class="form-control">
                            </div>
                            <div>
                                <label for="endDate" class="form-label">終了日</label>
                                <input type="date" id="endDate" class="form-control">
                            </div>
                            <div class="flex items-end mt-2">
                                <button type="button" onclick="searchChartData()" class="btn btn-primary w-full">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline mr-2">
                                        <circle cx="11" cy="11" r="8"/>
                                        <path d="m21 21-4.35-4.35"/>
                                    </svg>
                                    検索
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <canvas id="volumeChart" width="400" height="200"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer th:replace="~{common :: footerFragment}"></footer>
    
    <!-- JavaScript -->
    <script th:src="@{/js/theme.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:src="@{/js/chart.js}"></script>
    <script th:src="@{/js/admin-training-detail.js}"></script>
    <script>
        // Set userId from data attribute
        const userIdElement = document.querySelector('body[data-user-id]');
        if (userIdElement && userIdElement.dataset.userId) {
            window.userId = parseInt(userIdElement.dataset.userId);
        } else {
            console.warn('User ID not found in data attribute, using fallback');
            window.userId = /*[[${userId}]]*/ 5;
        }
        console.log('Loaded userId:', window.userId);
    </script>
</body>
</html>
